<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UNP Records — Plataforma Musical</title>
  <!-- OpenGraph / Social -->
  <meta property="og:title" content="UNP Records — Música Independiente"/>
  <meta property="og:description" content="Escucha música de artistas independientes. Sin algoritmos, sin intermediarios."/>
  <meta property="og:image" content="https://unp-tapes.github.io/logo.png"/>
  <meta property="og:url" content="https://unp-tapes.github.io"/>
  <meta property="og:type" content="website"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.2/color-thief.umd.js"></script>
  <style>
    :root{
      --bg:#000;--s1:#0d0d0d;--s2:#161616;--border:#222;
      --accent:#ff6a00;--accent2:#ff4757;--purple:#7b4fff;
      --text:#eeeeff;--muted:#5a5a5a;--radius:10px;
      --fh:'Bebas Neue',sans-serif;--fb:'DM Mono',monospace;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;overflow-x:hidden;padding-bottom:90px}

    /* ── MESH GRADIENT ANIMADO ── */
    body::before{
      content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,106,0,.15) 0%,transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(123,79,255,.10) 0%,transparent 40%),
        radial-gradient(circle at 55% 10%, rgba(255,71,87,.06) 0%,transparent 35%);
      filter:blur(80px);
      animation:meshMove 20s ease-in-out infinite alternate;
    }
    @keyframes meshMove{
      from{transform:scale(1)}
      to{transform:scale(1.2) translate(5%,5%)}
    }

    /* ── NAV GLASSMORPHISM ── */
    nav{
      position:sticky;top:0;z-index:100;
      background:rgba(13,13,13,.6);
      backdrop-filter:blur(20px) saturate(180%);
      -webkit-backdrop-filter:blur(20px) saturate(180%);
      border-bottom:1px solid rgba(255,255,255,.06);
      display:flex;align-items:center;justify-content:space-between;
      padding:0 32px;height:60px;
    }
    .nav-logo{text-decoration:none}
    .nav-actions{display:flex;gap:12px;align-items:center}
    .btn{
      font-family:var(--fb);font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;
      padding:8px 18px;border-radius:6px;cursor:pointer;text-decoration:none;
      transition:all .3s ease;border:1px solid transparent;
    }
    .btn-ghost{border-color:var(--border);color:var(--muted);background:transparent}
    .btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
    .btn-solid{background:var(--accent);color:#000;border-color:var(--accent);font-weight:500}
    .btn-solid:hover{background:#ff8c00;border-color:#ff8c00}

    /* ── HERO ── */
    .hero{position:relative;z-index:1;text-align:center;padding:48px 24px 40px}
    .hero p{color:var(--muted);font-size:.78rem;letter-spacing:.08em;max-width:400px;margin:0 auto}

    /* ── WRAP ── */
    .wrap{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:0 24px 40px}

    /* ── FILTER BAR ── */
    .filter-bar{display:flex;align-items:center;gap:12px;margin-bottom:40px;flex-wrap:wrap}
    .filter-label{font-size:.65rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
    .filter-input{
      flex:1;min-width:200px;background:var(--s1);border:1px solid var(--border);
      border-radius:6px;color:var(--text);font-family:var(--fb);font-size:.78rem;
      padding:8px 14px;outline:none;transition:border-color .3s ease;
    }
    .filter-input:focus{border-color:var(--accent)}
    .filter-input::placeholder{color:var(--muted)}

    /* ── ARTIST SECTION SCROLL REVEAL ── */
    .artist-section{
      margin-bottom:56px;
      animation:reveal .8s ease forwards;
      opacity:0;
    }
    .artist-section.hidden{display:none}
    @keyframes reveal{
      from{opacity:0;transform:translateY(30px)}
      to{opacity:1;transform:translateY(0)}
    }
    .artist-section:nth-child(2){animation-delay:.1s}
    .artist-section:nth-child(3){animation-delay:.2s}
    .artist-section:nth-child(4){animation-delay:.3s}
    .artist-section:nth-child(5){animation-delay:.4s}
    .artist-header{
      display:flex;align-items:center;gap:16px;
      padding:20px 0 16px;border-bottom:1px solid var(--border);margin-bottom:20px;
    }
    .artist-avatar{
      width:52px;height:52px;border-radius:50%;object-fit:cover;flex-shrink:0;
      border:2px solid var(--border);background:var(--s2);font-size:1.4rem;
      display:flex;align-items:center;justify-content:center;
    }
    .artist-info h2{font-family:var(--fh);font-size:1.5rem;letter-spacing:2px}
    .artist-info p{font-size:.68rem;color:var(--muted);letter-spacing:.08em;margin-top:2px}
    .track-count{
      margin-left:auto;font-size:.65rem;color:var(--muted);
      background:var(--s2);border:1px solid var(--border);border-radius:4px;padding:3px 10px;
    }

    /* ── ALBUM GLASSMORPHISM ── */
    .album-section{margin-bottom:24px}
    .album-header{
      display:flex;align-items:center;gap:12px;padding:12px 14px;
      background:rgba(255,106,0,.06);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      border:1px solid rgba(255,106,0,.15);
      border-radius:var(--radius) var(--radius) 0 0;
      border-bottom:2px solid var(--accent);
      box-shadow:0 4px 20px rgba(255,106,0,.08);
    }
    .album-cover{
      width:48px;height:48px;border-radius:6px;object-fit:cover;
      background:var(--s2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.4rem;
    }
    .album-cover img{width:100%;height:100%;border-radius:6px;object-fit:cover}
    .album-info .album-title{font-family:var(--fh);font-size:1.1rem;letter-spacing:2px;color:var(--accent)}
    .album-info .album-meta{font-size:.62rem;color:var(--muted);margin-top:2px}
    .album-tracks{border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);overflow:hidden}

    /* ── TRACK CARD GLASSMORPHISM ── */
    .track-list{display:flex;flex-direction:column;gap:10px}
    .track-card{
      background:rgba(255,255,255,.03);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,.05);
      box-shadow:0 8px 32px rgba(0,0,0,.3);
      border-radius:var(--radius);overflow:hidden;
      display:grid;grid-template-columns:100px 1fr;
      transition:transform .3s cubic-bezier(.175,.885,.32,1.275), border-color .3s, box-shadow .3s, background .3s;
      animation:fadeUp .4s ease both;height:100px;
    }
    .track-card.hidden{display:none}
    .album-tracks .track-card{
      border-radius:0;border:none;border-bottom:1px solid rgba(255,255,255,.04);
      height:72px;grid-template-columns:72px 1fr;
      backdrop-filter:none;background:rgba(255,255,255,.02);
    }
    .album-tracks .track-card:last-child{border-bottom:none}
    .album-tracks .track-card .track-cover{width:72px;height:72px}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    .track-card:hover{
      transform:translateY(-5px) scale(1.01);
      background:rgba(255,255,255,.06);
      border-color:var(--accent);
      box-shadow:0 12px 40px rgba(255,106,0,.15);
    }
    .track-card.playing{
      border-color:var(--accent);
      box-shadow:0 0 30px rgba(255,106,0,.2);
      background:rgba(255,106,0,.04);
    }

    /* ── PORTADA FLOTANTE ── */
    .track-cover{
      width:100px;height:100px;object-fit:cover;display:block;
      background:var(--s2);flex-shrink:0;
      border-right:1px solid rgba(255,255,255,.05);
      border-radius:8px 0 0 8px;
      box-shadow:0 10px 20px rgba(0,0,0,.5);
      filter:saturate(1.1);
    }
    .track-body{padding:10px 14px;display:flex;flex-direction:column;justify-content:space-between;min-width:0;position:relative}
    .track-meta{display:flex;justify-content:space-between;align-items:center;gap:8px}
    .track-num{font-size:.65rem;color:var(--muted);flex-shrink:0;margin-right:4px}
    .track-title{font-family:var(--fh);font-size:1.1rem;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
    .track-genre{
      font-size:.6rem;color:var(--accent);background:rgba(255,106,0,.08);
      border:1px solid rgba(255,106,0,.2);border-radius:4px;
      padding:2px 7px;white-space:nowrap;flex-shrink:0;text-transform:uppercase;letter-spacing:.08em;
    }

    /* ── PLAYER ROW ── */
    .audio-row{display:flex;align-items:center;gap:10px;flex:1;position:relative}
    .play-btn{
      width:34px;height:34px;border-radius:50%;background:var(--accent);
      border:none;cursor:pointer;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
      transition:background .2s,transform .15s;z-index:2;
    }
    .play-btn:hover{background:#ff8c00;transform:scale(1.2)}
    .play-btn:active{transform:scale(.95)}
    .play-btn svg{width:13px;height:13px;fill:#000}
    .play-btn.loading{background:var(--s2);border:2px solid var(--accent);animation:pulse .8s infinite}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,106,0,.4)}50%{box-shadow:0 0 0 6px rgba(255,106,0,0)}}

    .seek-wrap{flex:1;height:100%;display:flex;flex-direction:column;justify-content:center;position:relative;min-width:0}
    .visualizer-wrap{
      position:absolute;inset:0;display:flex;align-items:center;gap:1px;
      opacity:0;transition:opacity .3s;z-index:0;pointer-events:none;
    }
    .visualizer-wrap.active{opacity:.6}
    .viz-bar{
      flex:1;
      background:linear-gradient(to top, var(--accent), rgba(255,200,100,.8));
      box-shadow:0 0 15px rgba(255,106,0,.6);
      height:2px;
      transition:height 0.05s linear;
      border-radius:2px 2px 0 0;
      position:relative;
    }
    .viz-peak{display:none}
    input[type="range"].seek{
      -webkit-appearance:none;width:100%;background:transparent;
      outline:none;cursor:pointer;position:relative;z-index:1;height:34px;
    }
    input[type="range"].seek::-webkit-slider-runnable-track{width:100%;height:2px;background:rgba(255,255,255,.08)}
    input[type="range"].seek::-webkit-slider-thumb{
      -webkit-appearance:none;width:10px;height:10px;border-radius:50%;
      background:var(--accent);cursor:pointer;margin-top:-4px;
    }
    .controls-meta{
      display:flex;justify-content:space-between;align-items:center;
      font-size:.6rem;color:var(--muted);font-family:var(--fb);
      position:relative;z-index:2;margin-top:-2px;
    }
    .time-row{display:flex;gap:4px}
    .dl-btn{
      display:flex;align-items:center;gap:5px;flex-shrink:0;
      background:transparent;border:1px solid var(--border);border-radius:5px;
      color:var(--muted);font-family:var(--fb);font-size:.6rem;
      letter-spacing:.06em;text-transform:uppercase;padding:3px 10px;
      cursor:pointer;transition:border-color .2s,color .2s;
    }
    .dl-btn:hover{border-color:var(--accent);color:var(--accent)}
    .dl-btn svg{width:10px;height:10px;fill:currentColor}

    /* ── SKELETON ── */
    .skeleton-wrap{display:flex;flex-direction:column;gap:10px}
    .skeleton-card{
      height:100px;border-radius:var(--radius);overflow:hidden;
      display:grid;grid-template-columns:100px 1fr;
      background:var(--s1);border:1px solid var(--border);
    }
    .skeleton-cover{width:100px;height:100px;background:var(--s2)}
    .skeleton-body{padding:14px 16px;display:flex;flex-direction:column;gap:10px;justify-content:center}
    .skeleton-line{height:12px;border-radius:4px;background:var(--s2);animation:shimmer 1.4s infinite}
    .skeleton-line.wide{width:60%}
    .skeleton-line.narrow{width:35%}
    @keyframes shimmer{
      0%{background:var(--s2)}
      50%{background:#1e1e1e}
      100%{background:var(--s2)}
    }

    /* ── FLOATING PLAYER ── */
    #floating-player{
      position:fixed;bottom:0;left:0;right:0;z-index:200;
      background:rgba(13,13,13,.95);
      backdrop-filter:blur(20px) saturate(180%);
      -webkit-backdrop-filter:blur(20px) saturate(180%);
      border-top:1px solid var(--border);
      height:72px;
      display:none;
      align-items:center;
      padding:0 24px;
      gap:16px;
    }
    #floating-player.visible{display:flex}
    .fp-cover{
      width:44px;height:44px;border-radius:6px;object-fit:cover;
      background:var(--s2);flex-shrink:0;
      display:flex;align-items:center;justify-content:center;font-size:1.2rem;
      border:1px solid var(--border);
    }
    .fp-cover img{width:100%;height:100%;border-radius:6px;object-fit:cover}
    .fp-info{flex:1;min-width:0}
    .fp-title{font-family:var(--fh);font-size:1rem;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .fp-artist{font-size:.62rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .fp-controls{display:flex;align-items:center;gap:10px;flex-shrink:0}
    .fp-btn{
      width:36px;height:36px;border-radius:50%;background:var(--accent);
      border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
      transition:background .2s,transform .15s;flex-shrink:0;
    }
    .fp-btn:hover{background:#ff8c00;transform:scale(1.06)}
    .fp-btn svg{width:14px;height:14px;fill:#000}
    .fp-prev,.fp-next{
      width:30px;height:30px;border-radius:50%;background:transparent;
      border:1px solid var(--border);cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:border-color .2s,color .2s;color:var(--muted);
    }
    .fp-prev:hover,.fp-next:hover{border-color:var(--accent);color:var(--accent)}
    .fp-prev svg,.fp-next svg{width:12px;height:12px;fill:currentColor}
    .fp-seek-wrap{flex:2;max-width:300px;display:flex;flex-direction:column;gap:4px}
    input[type="range"].fp-seek{
      -webkit-appearance:none;width:100%;height:3px;
      background:var(--border);border-radius:2px;outline:none;cursor:pointer;accent-color:var(--accent);
    }
    input[type="range"].fp-seek::-webkit-slider-thumb{
      -webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--accent);cursor:pointer;
    }
    .fp-time{display:flex;justify-content:space-between;font-size:.58rem;color:var(--muted)}
    /* VOLUME */
    .fp-vol-wrap{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .fp-vol-icon{color:var(--muted);font-size:.9rem;cursor:pointer;user-select:none}
    input[type="range"].fp-vol{
      -webkit-appearance:none;width:80px;height:3px;
      background:var(--border);border-radius:2px;outline:none;cursor:pointer;accent-color:var(--accent);
    }
    input[type="range"].fp-vol::-webkit-slider-thumb{
      -webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--accent);cursor:pointer;
    }

    /* ── STATES ── */
    .state-msg{text-align:center;padding:60px 0;color:var(--muted);font-size:.78rem;letter-spacing:.1em}
    footer{position:relative;z-index:1;text-align:center;padding:32px 0;border-top:1px solid var(--border);font-size:.65rem;color:var(--muted);letter-spacing:.1em}
    footer span{color:var(--accent)}
    @media(max-width:600px){
      nav{padding:0 16px}
      .track-card{grid-template-columns:72px 1fr;height:80px}
      .track-cover{width:72px;height:80px}
      .fp-seek-wrap{display:none}
      .fp-vol-wrap{display:none}
      #floating-player{padding:0 16px;gap:10px}
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <img src="logo.png" alt="UNP Records" style="height:38px;display:block" onerror="this.style.display='none'"/>
  </a>
  <div class="nav-actions">
    <a href="dashboard.html" class="btn btn-ghost">Mi Panel</a>
    <a href="dashboard.html#register" class="btn btn-solid">Unirse</a>
  </div>
</nav>

<div class="hero">
  <img src="logo.png" alt="UNP Records" loading="lazy" style="width:260px;max-width:75%;margin:0 auto 14px;display:block;filter:drop-shadow(0 0 28px rgba(255,106,0,.35))"/>
  <p>Música de artistas independientes. Sin algoritmos, sin intermediarios.</p>
</div>

<div class="wrap">
  <div class="filter-bar">
    <span class="filter-label">Buscar</span>
    <input type="text" class="filter-input" id="searchInput" placeholder="Artista, canción, álbum, género…" oninput="filterTracks()"/>
  </div>
  <div id="content">
    <!-- Skeleton loader -->
    <div class="skeleton-wrap">
      ${[1,2,3].map(()=>`
      <div class="skeleton-card">
        <div class="skeleton-cover"></div>
        <div class="skeleton-body">
          <div class="skeleton-line wide"></div>
          <div class="skeleton-line narrow"></div>
        </div>
      </div>`).join('')}
    </div>
  </div>
</div>

<footer>
  <p>UNP Records · Música independiente · <span>Santiago, Chile</span></p>
</footer>

<!-- ── FLOATING PLAYER ── -->
<div id="floating-player">
  <div class="fp-cover" id="fp-cover">🎵</div>
  <div class="fp-info">
    <div class="fp-title" id="fp-title">—</div>
    <div class="fp-artist" id="fp-artist">—</div>
  </div>
  <div class="fp-controls">
    <button class="fp-prev" onclick="fpPrev()" aria-label="Anterior">
      <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
    </button>
    <button class="fp-btn" id="fp-play-btn" onclick="fpToggle()" aria-label="Reproducir/Pausar">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <button class="fp-next" onclick="fpNext()" aria-label="Siguiente">
      <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2.5-6 5.5 4V8l-5.5 4zm7-6h2v12h-2z"/></svg>
    </button>
  </div>
  <div class="fp-seek-wrap">
    <input type="range" class="fp-seek" id="fp-seek" value="0" min="0" step="0.1" oninput="fpSeek(this)"/>
    <div class="fp-time">
      <span id="fp-cur">0:00</span>
      <span id="fp-dur">—:——</span>
    </div>
  </div>
  <div class="fp-vol-wrap">
    <span class="fp-vol-icon" onclick="fpMute()" id="fp-vol-icon">🔊</span>
    <input type="range" class="fp-vol" id="fp-vol" value="100" min="0" max="100" oninput="fpVolume(this)"/>
  </div>
</div>

<script type="module">
  import { initializeApp }           from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection,
           getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAQeS0wTC4HhRx78uGTvWnfjcZoZCk_zME",
    authDomain: "unp-tapes-e5942.firebaseapp.com",
    projectId: "unp-tapes-e5942",
    storageBucket: "unp-tapes-e5942.firebasestorage.app",
    messagingSenderId: "850772544349",
    appId: "1:850772544349:web:c70a87db6e32a24d1876b4"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  const ICON_PLAY    = `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;
  const ICON_PAUSE   = `<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;
  const ICON_LOADING = `<svg viewBox="0 0 24 24" style="animation:spin .7s linear infinite"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z" opacity=".3"/><path d="M12 2a10 10 0 0 1 10 10h-2a8 8 0 0 0-8-8z"/></svg>`;

  function fmt(s){ if(!s||isNaN(s))return'0:00'; return`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`; }

  let allData    = [];
  let globalRows = [];
  let currentRowIndex = -1;

  // ── AUDIO CONTEXT GLOBAL ──
  let audioCtx  = null;
  let gainNode  = null;
  const vizMap  = new Map();
  const NUM_BARS = 32, PEAK_HOLD = 18, PEAK_FALL = 0.8;

  function getAudioCtx(){
    if(!audioCtx){
      audioCtx = new (window.AudioContext||window.webkitAudioContext)();
      gainNode = audioCtx.createGain();
      gainNode.gain.value = 1;
      gainNode.connect(audioCtx.destination);
    }
    return audioCtx;
  }

  function buildBars(container){
    container.innerHTML='';
    const bars=[],peaks=[];
    for(let i=0;i<NUM_BARS;i++){
      const bar=document.createElement('div'); bar.className='viz-bar';
      const peak=document.createElement('div'); peak.className='viz-peak';
      bar.appendChild(peak); container.appendChild(bar);
      bars.push(bar); peaks.push(peak);
    }
    return{bars,peaks};
  }

  async function loadAll(){
    try{
      const artistsSnap = await getDocs(collection(db,'artists'));
      const artists = [];
      artistsSnap.forEach(d => artists.push({id:d.id,...d.data()}));
      for(const artist of artists){
        const tSnap = await getDocs(query(collection(db,`artists/${artist.id}/tracks`), orderBy('createdAt','asc')));
        const tracks = [];
        tSnap.forEach(d => tracks.push({id:d.id,...d.data()}));
        allData.push({artist, tracks});
      }
      renderAll(allData);
    } catch(e){
      document.getElementById('content').innerHTML = `<div class="state-msg">Error al cargar: ${e.message}</div>`;
    }
  }

  function renderAll(data){
    const container = document.getElementById('content');
    const filtered  = data.filter(d => d.tracks.length > 0);
    if(!filtered.length){ container.innerHTML = `<div class="state-msg">Aún no hay canciones publicadas.</div>`; return; }
    container.innerHTML = filtered.map(({artist,tracks}) => renderArtistSection(artist,tracks)).join('');
    initPlayers();
  }

  function renderArtistSection(artist, tracks){
    const avatarHTML = artist.photoURL
      ? `<img class="artist-avatar" src="${artist.photoURL}" alt="${artist.name}" loading="lazy" style="display:block"/>`
      : `<div class="artist-avatar">${(artist.name||'?')[0].toUpperCase()}</div>`;

    const singles = tracks.filter(t => t.type !== 'album');
    const albumMap = {};
    tracks.filter(t => t.type === 'album').forEach(t => {
      const key = t.albumName || 'Sin título';
      if(!albumMap[key]) albumMap[key] = {name:key, coverURL:t.albumCoverURL||t.coverURL||'', tracks:[]};
      albumMap[key].tracks.push(t);
    });
    const albums = Object.values(albumMap);

    const singlesHTML = singles.length
      ? `<div class="track-list">${singles.map(t => renderTrackCard(t,null,artist)).join('')}</div>` : '';

    const albumsHTML = albums.map(album => `
      <div class="album-section">
        <div class="album-header">
          ${album.coverURL
            ? `<div class="album-cover"><img src="${album.coverURL}" alt="${album.name}" loading="lazy"/></div>`
            : `<div class="album-cover">💿</div>`}
          <div class="album-info">
            <div class="album-title">${album.name}</div>
            <div class="album-meta">${album.tracks.length} track${album.tracks.length!==1?'s':''} · Álbum</div>
          </div>
        </div>
        <div class="album-tracks">${album.tracks.map((t,i) => renderTrackCard(t,i+1,artist)).join('')}</div>
      </div>`).join('');

    return `
    <div class="artist-section" data-artist="${(artist.name||'').toLowerCase()}">
      <div class="artist-header">
        ${avatarHTML}
        <div class="artist-info">
          <h2>${artist.name||'Artista'}</h2>
          <p>${artist.genre||''} ${artist.city ? '· '+artist.city : ''}</p>
        </div>
        <span class="track-count">${tracks.length} track${tracks.length!==1?'s':''}</span>
      </div>
      ${singlesHTML}
      ${albumsHTML}
    </div>`;
  }

  function renderTrackCard(track, num, artist){
    const artistName = artist?.name || '';
    const cover = track.coverURL
      ? `<img class="track-cover" src="${track.coverURL}" alt="${track.title}" loading="lazy"/>`
      : `<div class="track-cover" style="display:flex;align-items:center;justify-content:center;font-size:2rem;background:var(--s2)">🎵</div>`;
    return `
    <div class="track-card"
      data-url="${track.audioURL||''}"
      data-title="${(track.title||'').toLowerCase()}"
      data-genre="${(track.genre||'').toLowerCase()}"
      data-artist-name="${artistName.toLowerCase()}"
      data-track-title="${track.title||'Sin título'}"
      data-artist-display="${artistName}"
      data-cover="${track.coverURL||''}">
      ${cover}
      <div class="track-body">
        <div class="track-meta">
          ${num?`<span class="track-num">${num}.</span>`:''}
          <span class="track-title">${track.title||'Sin título'}</span>
          ${track.genre?`<span class="track-genre">${track.genre}</span>`:''}
        </div>
        <div class="audio-row">
          <button class="play-btn" data-playing="false" aria-label="Reproducir ${track.title||'canción'}">${ICON_PLAY}</button>
          <div class="seek-wrap">
            <div class="visualizer-wrap" id="viz-${track.id}"></div>
            <input type="range" class="seek" value="0" min="0" step="0.1"/>
          </div>
        </div>
        <div class="controls-meta">
          <div class="time-row">
            <span class="current-time">0:00</span>
            <span>/</span>
            <span class="duration">—:——</span>
          </div>
          ${track.downloadable?`
          <button class="dl-btn" onclick="downloadTrack('${track.audioURL}','${(track.title||'track').replace(/'/g,"\\'")}',this)" aria-label="Descargar ${track.title||'canción'}">
            <svg viewBox="0 0 24 24"><path d="M5 20h14v-2H5v2zm7-18v10.59l-3.3-3.3-1.41 1.41L12 15.41l4.71-4.71-1.41-1.41L13 12.59V2h-1z"/></svg>
            Descargar
          </button>`:''}
        </div>
      </div>
    </div>`;
  }

  // ── INIT PLAYERS ──
  function initPlayers(){
    globalRows = Array.from(document.querySelectorAll('.audio-row'));

    globalRows.forEach((row, rowIndex) => {
      const card     = row.closest('.track-card');
      const body     = row.closest('.track-body');
      const audioURL = card?.dataset.url||'';
      const seek     = row.querySelector('.seek');
      const curEl    = body?.querySelector('.current-time');
      const durEl    = body?.querySelector('.duration');
      const btn      = row.querySelector('.play-btn');
      const vizId    = row.querySelector('.visualizer-wrap')?.id;
      if(!audioURL) return;

      const audio = new Audio();
      audio.crossOrigin = 'anonymous';
      audio.preload = 'none';
      audio.src = audioURL;
      row._audio = audio;
      row._rowIndex = rowIndex;

      let vizReady = false;
      function initVizOnce(){
        if(vizReady||!vizId) return; vizReady=true;
        try{
          const ctx=getAudioCtx();
          const analyser=ctx.createAnalyser();
          analyser.fftSize=128; analyser.smoothingTimeConstant=0.75;
          const src=ctx.createMediaElementSource(audio);
          src.connect(analyser); analyser.connect(gainNode);
          const container=document.getElementById(vizId); if(!container)return;
          const{bars,peaks}=buildBars(container);
          const data=new Uint8Array(analyser.frequencyBinCount);
          const maxH=25; let rafId=null;
          const peakH=new Array(NUM_BARS).fill(2), peakT=new Array(NUM_BARS).fill(0);
          bars.forEach(b=>{ b.style.background='rgba(255,106,0,0.5)'; });
          function draw(){
            rafId=requestAnimationFrame(draw);
            analyser.getByteFrequencyData(data);
            const len=data.length;
            for(let i=0;i<NUM_BARS;i++){
              const start=Math.floor(Math.pow(i/NUM_BARS,2)*len);
              const end=Math.floor(Math.pow((i+1)/NUM_BARS,2)*len)||start+1;
              let val=0; for(let j=start;j<end;j++) val+=data[j]; val/=(end-start);
              const h=Math.max(2,(val/255)*maxH); bars[i].style.height=h+'px';
              if(h>=peakH[i]){peakH[i]=h;peakT[i]=PEAK_HOLD;}
              else{if(peakT[i]>0)peakT[i]--;else peakH[i]=Math.max(2,peakH[i]-PEAK_FALL);}
              peaks[i].style.bottom=(peakH[i]-2)+'px';
            }
          }
          vizMap.set(audio,{
            rafId:null,
            start:()=>{ container.classList.add('active'); rafId=requestAnimationFrame(draw); vizMap.get(audio).rafId=rafId; },
            stop: ()=>{ cancelAnimationFrame(rafId); container.classList.remove('active'); bars.forEach(b=>b.style.height='2px'); }
          });
        }catch(e){ console.warn('Viz:',e.message); }
      }

      audio.addEventListener('loadedmetadata',()=>{
        if(durEl)durEl.textContent=fmt(audio.duration);
        seek.max=audio.duration;
        updateFP(rowIndex);
      });
      audio.addEventListener('timeupdate',()=>{
        seek.value=audio.currentTime;
        if(curEl)curEl.textContent=fmt(audio.currentTime);
        if(rowIndex===currentRowIndex) updateFPProgress(audio);
      });
      audio.addEventListener('waiting',()=>{ btn.classList.add('loading'); btn.innerHTML=ICON_LOADING; });
      audio.addEventListener('playing',()=>{ btn.classList.remove('loading'); btn.innerHTML=ICON_PAUSE; });

      // ── AUTOPLAY ──
      audio.addEventListener('ended',()=>{
        btn.dataset.playing='false'; btn.innerHTML=ICON_PLAY;
        seek.value=0; if(curEl)curEl.textContent='0:00';
        vizMap.get(audio)?.stop();
        card.classList.remove('playing');
        playNext(rowIndex);
      });

      row._initVizOnce = initVizOnce;

      btn.addEventListener('click',()=>{
        const playing=btn.dataset.playing==='true';
        stopAll(audio);
        if(playing){
          audio.pause(); btn.dataset.playing='false'; btn.innerHTML=ICON_PLAY;
          vizMap.get(audio)?.stop(); card.classList.remove('playing');
          currentRowIndex=-1; hideFP();
        } else {
          getAudioCtx().resume(); initVizOnce(); audio.play();
          btn.dataset.playing='true'; btn.innerHTML=ICON_PAUSE;
          vizMap.get(audio)?.start(); card.classList.add('playing');
          currentRowIndex=rowIndex; showFP(rowIndex);
        }
      });

      seek.addEventListener('input',()=>{ audio.currentTime=seek.value; });
    });
  }

  function stopAll(except){
    globalRows.forEach(r=>{
      const a=r._audio, b=r.querySelector('.play-btn'), c=r.closest('.track-card');
      if(a&&a!==except){ a.pause(); if(b){b.dataset.playing='false';b.innerHTML=ICON_PLAY;b.classList.remove('loading');} vizMap.get(a)?.stop(); if(c)c.classList.remove('playing'); }
    });
  }

  function playNext(fromIndex){
    for(let i=fromIndex+1;i<globalRows.length;i++){
      const nr=globalRows[i];
      if(!nr||nr.closest('.track-card')?.classList.contains('hidden')) continue;
      const na=nr._audio, nb=nr.querySelector('.play-btn'), nc=nr.closest('.track-card');
      if(na&&nb){
        stopAll(na);
        getAudioCtx().resume();
        nr._initVizOnce?.();
        na.play();
        nb.dataset.playing='true'; nb.innerHTML=ICON_PAUSE;
        vizMap.get(na)?.start();
        if(nc){nc.classList.add('playing'); nc.scrollIntoView({behavior:'smooth',block:'nearest'});}
        currentRowIndex=i; showFP(i);
        return;
      }
    }
    hideFP();
  }

  // ── FLOATING PLAYER ──
  // ── COLOR DINÁMICO POR PORTADA (ColorThief) ──
  const colorThief = new ColorThief();
  function applyDynamicColor(coverURL){
    if(!coverURL){ resetAccent(); return; }
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.src = coverURL;
    img.onload = ()=>{
      try{
        const [r,g,b] = colorThief.getColor(img);
        // Solo aplicar si el color es suficientemente saturado
        const max=Math.max(r,g,b), min=Math.min(r,g,b);
        const sat = max===0 ? 0 : (max-min)/max;
        if(sat > 0.3 && max > 60){
          document.documentElement.style.setProperty('--accent',`rgb(${r},${g},${b})`);
        } else {
          resetAccent();
        }
      }catch(e){ resetAccent(); }
    };
    img.onerror = resetAccent;
  }
  function resetAccent(){
    document.documentElement.style.setProperty('--accent','#ff6a00');
  }

  function showFP(rowIndex){
    const card = globalRows[rowIndex]?.closest('.track-card');
    if(!card) return;
    document.getElementById('fp-title').textContent  = card.dataset.trackTitle || '—';
    document.getElementById('fp-artist').textContent = card.dataset.artistDisplay || '—';
    const cover = card.dataset.cover;
    const fpCover = document.getElementById('fp-cover');
    fpCover.innerHTML = cover ? `<img src="${cover}" alt="cover" loading="lazy" style="width:100%;height:100%;border-radius:6px;object-fit:cover"/>` : '🎵';
    document.getElementById('fp-play-btn').innerHTML = `<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;
    document.getElementById('floating-player').classList.add('visible');
    applyDynamicColor(cover);
  }

  function hideFP(){
    document.getElementById('floating-player').classList.remove('visible');
    document.getElementById('fp-play-btn').innerHTML = ICON_PLAY;
    currentRowIndex = -1;
    resetAccent();
  }

  function updateFP(rowIndex){
    if(rowIndex !== currentRowIndex) return;
    const audio = globalRows[rowIndex]?._audio;
    if(!audio) return;
    document.getElementById('fp-dur').textContent = fmt(audio.duration);
    document.getElementById('fp-seek').max = audio.duration;
  }

  function updateFPProgress(audio){
    const fpSeek = document.getElementById('fp-seek');
    fpSeek.value = audio.currentTime;
    fpSeek.max   = audio.duration || 0;
    document.getElementById('fp-cur').textContent = fmt(audio.currentTime);
    document.getElementById('fp-dur').textContent = fmt(audio.duration);
  }

  window.fpToggle = function(){
    if(currentRowIndex<0) return;
    const row = globalRows[currentRowIndex];
    if(row) row.querySelector('.play-btn')?.click();
  };

  window.fpNext = function(){ if(currentRowIndex>=0) playNext(currentRowIndex); };

  window.fpPrev = function(){
    for(let i=currentRowIndex-1;i>=0;i--){
      const nr=globalRows[i];
      if(!nr||nr.closest('.track-card')?.classList.contains('hidden')) continue;
      const na=nr._audio, nb=nr.querySelector('.play-btn'), nc=nr.closest('.track-card');
      if(na&&nb){
        stopAll(na);
        getAudioCtx().resume();
        nr._initVizOnce?.();
        na.play();
        nb.dataset.playing='true'; nb.innerHTML=ICON_PAUSE;
        vizMap.get(na)?.start();
        if(nc){nc.classList.add('playing'); nc.scrollIntoView({behavior:'smooth',block:'nearest'});}
        currentRowIndex=i; showFP(i);
        return;
      }
    }
  };

  window.fpSeek = function(input){
    if(currentRowIndex<0) return;
    const audio = globalRows[currentRowIndex]?._audio;
    if(audio) audio.currentTime = input.value;
  };

  window.fpVolume = function(input){
    const vol = input.value / 100;
    if(gainNode) gainNode.gain.value = vol;
    const icon = document.getElementById('fp-vol-icon');
    icon.textContent = vol===0 ? '🔇' : vol<0.5 ? '🔉' : '🔊';
  };

  let muted = false, lastVol = 100;
  window.fpMute = function(){
    muted = !muted;
    const slider = document.getElementById('fp-vol');
    if(muted){ lastVol=slider.value; slider.value=0; }
    else slider.value=lastVol;
    window.fpVolume(slider);
  };

  // ── FILTRADO NO DESTRUCTIVO + DEBOUNCE ──
  let filterTimeout;
  window.filterTracks = function(){
    clearTimeout(filterTimeout);
    filterTimeout = setTimeout(()=>{
      const q = document.getElementById('searchInput').value.toLowerCase().trim();
      const cards    = document.querySelectorAll('.track-card');
      const sections = document.querySelectorAll('.artist-section');

      cards.forEach(card=>{
        const text = (
          (card.dataset.title||'') + ' ' +
          (card.dataset.genre||'') + ' ' +
          (card.dataset.artistName||'')
        ).toLowerCase();
        const match = !q || text.includes(q);
        card.classList.toggle('hidden', !match);
      });

      sections.forEach(section=>{
        const hasVisible = Array.from(section.querySelectorAll('.track-card')).some(c=>!c.classList.contains('hidden'));
        section.classList.toggle('hidden', !hasVisible);
      });
    }, 300);
  };

  // ── DESCARGA ──
  window.downloadTrack = async function(url,title,btn){
    try{
      const orig=btn.innerHTML; btn.textContent='…';
      const res=await fetch(url); const blob=await res.blob();
      const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=title+'.mp3'; a.click();
      URL.revokeObjectURL(a.href); btn.innerHTML=orig;
    }catch(e){ alert('Error al descargar: '+e.message); }
  };

  loadAll();
</script>
