<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Artista — UNP Records</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.2/color-thief.umd.js"></script>
  <style>
    :root{
      /* Paleta actualizada: Negro, Naranja y Blanco Nieve */
      --bg: #000000;
      --s1: #121212;
      --s2: #1a1a1a;
      --border: #282828;
      --accent: #ff6a00;
      --muted: #888888;
      --text: #f5f5f5;
      --radius: 10px;
      --fh: 'Bebas Neue', sans-serif;
      --fb: 'DM Mono', monospace;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;overflow-x:hidden;padding-bottom:100px}

    /* ── BACK BTN ── */
    .back-btn{
      position:fixed;top:18px;left:18px;z-index:200;
      color:var(--text);text-decoration:none;
      background:rgba(0,0,0,.6);padding:8px 18px;
      border-radius:50px;border:1px solid #333;
      backdrop-filter:blur(12px);font-size:.72rem;
      letter-spacing:.1em;text-transform:uppercase;
      transition:all .2s;
    }
    .back-btn:hover{border-color:var(--accent);color:var(--accent)}

    /* ── ARTIST HEADER ── */
    .artist-header{
      height:45vh;min-height:280px;
      display:flex;align-items:flex-end;
      padding:40px;position:relative;overflow:hidden;
    }
    .header-bg{
      position:absolute;inset:0;z-index:0;
      background-size:cover;background-position:center;
      opacity:.35;filter:blur(40px);transform:scale(1.1);
      transition:opacity 1s;
    }
    .header-overlay{
      position:absolute;inset:0;z-index:1;
      background:linear-gradient(to top,rgba(0,0,0,.95) 0%,rgba(0,0,0,.2) 100%);
    }
    .header-content{
      position:relative;z-index:2;
      display:flex;align-items:flex-end;gap:28px;width:100%;
    }
    .header-avatar{
      width:130px;height:130px;border-radius:50%;
      border:3px solid var(--accent);object-fit:cover;
      flex-shrink:0;background:var(--s2);
      display:flex;align-items:center;justify-content:center;
      font-family:var(--fh);font-size:3rem;color:var(--muted);
      overflow:hidden;
      box-shadow:0 0 30px rgba(255,106,0,.3);
    }
    .header-avatar img{width:100%;height:100%;object-fit:cover}
    .header-info{flex:1}
    .header-name{
      font-family:var(--fh);font-size:clamp(2.5rem,7vw,4.5rem);
      letter-spacing:3px;line-height:1;
    }
    .header-meta{color:var(--accent);font-size:.8rem;letter-spacing:2px;margin-top:6px}
    .header-stats{display:flex;gap:20px;margin-top:12px}
    .header-stat span{font-family:var(--fh);font-size:1.2rem;color:#fff;display:block}
    .header-stat label{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
    .play-all-btn{
      display:flex;align-items:center;gap:8px;
      background:var(--accent);color:#000;border:none;
      font-family:var(--fh);font-size:1rem;letter-spacing:2px;
      padding:10px 24px;border-radius:30px;cursor:pointer;
      transition:all .2s;flex-shrink:0;
      box-shadow:0 4px 20px rgba(255,106,0,.4);
    }
    .play-all-btn:hover{background:#ff8c00;transform:scale(1.04)}
    .play-all-btn svg{width:14px;height:14px;fill:#000}

    /* ── TABS ── */
    .tabs{
      display:flex;gap:0;
      border-bottom:1px solid var(--border);
      padding:0 40px;
      background:rgba(0,0,0,.6);
      backdrop-filter:blur(12px);
      position:sticky;top:0;z-index:50;
    }
    .tab{
      font-family:var(--fh);font-size:1.3rem;letter-spacing:2px;
      padding:14px 20px;cursor:pointer;color:var(--muted);
      border-bottom:2px solid transparent;
      transition:all .2s;margin-bottom:-1px;
    }
    .tab.active{color:#fff;border-color:var(--accent)}
    .tab:hover:not(.active){color:var(--text)}

    /* ── CONTENT ── */
    .content{max-width:900px;margin:0 auto;padding:28px 40px}

    /* ── TRACK ROW ── */
    .tracks-list{display:flex;flex-direction:column}
    .track-row{
      display:flex;align-items:center;gap:16px;
      padding:14px 16px;
      border-bottom:1px solid rgba(255,255,255,.04);
      cursor:pointer;
      transition:background .2s,border-left .2s;
      border-left:3px solid transparent;
      border-radius:0;
      animation:fadeUp .3s ease both;
    }
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    .track-row:hover{background:rgba(255,255,255,.03)}
    .track-row.playing{
      background:rgba(255,106,0,.06);
      border-left-color:var(--accent);
    }
    .track-num{font-size:.65rem;color:var(--muted);min-width:20px;text-align:center;flex-shrink:0}
    .track-row-cover{
      width:52px;height:52px;border-radius:6px;
      object-fit:cover;background:var(--s2);flex-shrink:0;
      display:flex;align-items:center;justify-content:center;font-size:1.3rem;
      overflow:hidden;
    }
    .track-row-cover img{width:100%;height:100%;object-fit:cover}
    .track-row-info{flex:1;min-width:0}
    .track-row-title{
      font-family:var(--fh);font-size:1.05rem;letter-spacing:1px;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .track-row.playing .track-row-title{color:var(--accent)}
    .track-row-meta{font-size:.6rem;color:var(--muted);margin-top:2px}

    /* ── WAVEFORM PLAYER (inline) ── */
    .track-row-player{
      display:none;width:100%;
      flex-direction:column;gap:4px;
      padding:8px 0 4px;
      border-top:1px solid rgba(255,255,255,.05);
      margin-top:8px;
    }
    .track-row-player.open{display:flex}
    .waveform-row{display:flex;align-items:center;gap:10px}
    .play-btn{
      width:30px;height:30px;border-radius:50%;background:var(--accent);
      border:none;cursor:pointer;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 3px 10px rgba(0,0,0,.4),inset 0 1px 1px rgba(255,255,255,.3);
      transition:all .2s;
    }
    .play-btn:hover{background:#ff8c00;transform:scale(1.1)}
    .play-btn:active{transform:scale(.92)}
    .play-btn svg{width:11px;height:11px;fill:#000}
    .play-btn.loading{background:var(--s2);border:2px solid var(--accent);animation:pulse .8s infinite}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,106,0,.4)}50%{box-shadow:0 0 0 5px rgba(255,106,0,0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    .waveform-wrap{flex:1;position:relative;height:36px;cursor:pointer;min-width:0}
    .waveform-canvas{width:100%;height:36px;display:block}
    .waveform-time{font-size:.58rem;color:var(--muted);white-space:nowrap;flex-shrink:0}

    .track-type-badge{
      font-size:.58rem;color:var(--accent);
      border:1px solid rgba(255,106,0,.3);
      padding:2px 8px;border-radius:4px;
      text-transform:uppercase;letter-spacing:.08em;flex-shrink:0;
    }
    .share-btn{
      display:flex;align-items:center;justify-content:center;
      background:transparent;border:1px solid var(--border);border-radius:5px;
      color:var(--muted);padding:5px 8px;cursor:pointer;
      transition:all .2s;flex-shrink:0;width:30px;height:30px;
    }
    .share-btn:hover{border-color:var(--accent);color:var(--accent)}
    .share-btn svg{width:14px;height:14px;fill:currentColor}
    .share-btn.copied{border-color:#4caf50;color:#4caf50}
    .dl-btn{
      display:flex;align-items:center;gap:4px;background:transparent;
      border:1px solid var(--border);border-radius:5px;color:var(--muted);
      font-family:var(--fb);font-size:.6rem;text-transform:uppercase;
      padding:3px 8px;cursor:pointer;transition:all .2s;flex-shrink:0;
    }
    .dl-btn:hover{border-color:var(--accent);color:var(--accent)}
    .dl-btn svg{width:10px;height:10px;fill:currentColor}

    /* ── ALBUM HEADER ── */
    .album-header{
      display:flex;align-items:center;gap:14px;
      padding:14px 16px;margin-top:20px;
      background:rgba(255,106,0,.05);
      border:1px solid rgba(255,106,0,.12);
      border-radius:var(--radius) var(--radius) 0 0;
      border-bottom:2px solid var(--accent);
    }
    .album-thumb{width:48px;height:48px;border-radius:6px;object-fit:cover;background:var(--s2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.4rem;overflow:hidden}
    .album-thumb img{width:100%;height:100%;object-fit:cover}
    .album-info{flex:1}
    .album-name{font-family:var(--fh);font-size:1.1rem;letter-spacing:2px;color:var(--accent)}
    .album-meta-text{font-size:.62rem;color:var(--muted);margin-top:2px}
    .album-play-btn{display:flex;align-items:center;gap:6px;background:var(--accent);color:#000;border:none;font-family:var(--fh);font-size:.9rem;letter-spacing:1px;padding:7px 14px;border-radius:20px;cursor:pointer;transition:background .2s}
    .album-play-btn:hover{background:#ff8c00}
    .album-play-btn svg{width:11px;height:11px;fill:#000}
    .album-tracks-wrap{border:1px solid rgba(255,255,255,.05);border-top:none;border-radius:0 0 var(--radius) var(--radius);overflow:hidden;margin-bottom:24px}

    /* ── FLOATING PLAYER ── */
    #floating-player{
      position:fixed;bottom:0;left:0;right:0;z-index:200;
      background:rgba(5,5,5,.98);
      backdrop-filter:blur(24px) saturate(180%);
      border-top:1px solid var(--accent);
      height:80px;display:none;align-items:center;
      padding:0 40px;gap:16px;
    }
    #floating-player.visible{display:flex}
    .fp-cover{width:48px;height:48px;border-radius:6px;background:var(--s2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:1.2rem;border:1px solid #333}
    .fp-cover img{width:100%;height:100%;object-fit:cover}
    .fp-info{width:180px;min-width:0;flex-shrink:0}
    .fp-title{font-family:var(--fh);font-size:.95rem;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--accent)}
    .fp-artist{font-size:.6rem;color:var(--muted);margin-top:1px}
    .fp-controls{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .fp-btn{width:34px;height:34px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;box-shadow:0 3px 12px rgba(0,0,0,.4)}
    .fp-btn:hover{background:#ff8c00;transform:scale(1.08)}
    .fp-btn svg{width:13px;height:13px;fill:#000}
    .fp-nav{width:28px;height:28px;border-radius:50%;background:transparent;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;color:var(--muted)}
    .fp-nav:hover{border-color:var(--accent);color:var(--accent)}
    .fp-nav svg{width:11px;height:11px;fill:currentColor}
    .fp-wave-wrap{flex:1;display:flex;flex-direction:column;gap:3px;min-width:0}
    .fp-canvas{width:100%;height:26px;display:block;cursor:pointer}
    .fp-time{display:flex;justify-content:space-between;font-size:.56rem;color:var(--muted)}
    .fp-vol{display:flex;align-items:center;gap:6px;flex-shrink:0}
    .fp-vol-icon{font-size:.85rem;cursor:pointer;user-select:none;color:var(--muted)}
    input[type="range"].fp-vol-slider{-webkit-appearance:none;width:70px;height:3px;background:var(--border);border-radius:2px;outline:none;cursor:pointer;accent-color:var(--accent)}
    input[type="range"].fp-vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--accent);cursor:pointer}

    /* ── PLAY BANNER ── */
    .play-banner{
      position:fixed;top:50%;left:50%;
      transform:translate(-50%,-50%);
      z-index:400;
      background:var(--accent);color:#000;
      font-family:var(--fh);font-size:1.4rem;letter-spacing:3px;
      padding:20px 40px;border-radius:50px;
      cursor:pointer;border:none;
      box-shadow:0 0 60px rgba(2
