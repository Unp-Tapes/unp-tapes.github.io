<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Artista — Unp-Tapes</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --accent: #ff6a00; --fh: 'Bebas Neue'; --fb: 'DM Mono'; }
        body { background: var(--bg); color: #eee; font-family: var(--fb); margin: 0; padding-bottom: 120px; }
        
        .back-btn { position: fixed; top: 20px; left: 20px; z-index: 1000; color: white; text-decoration: none; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 50px; border: 1px solid #333; backdrop-filter: blur(10px); font-size: 0.8rem; transition: 0.3s; }
        .back-btn:hover { border-color: var(--accent); color: var(--accent); }

        .header { height: 45vh; display: flex; align-items: flex-end; padding: 40px; position: relative; overflow: hidden; }
        #header-bg { position: absolute; inset: 0; z-index: -1; object-fit: cover; width: 100%; height: 100%; opacity: 0.3; filter: blur(40px); transform: scale(1.1); }
        
        .profile-info { display: flex; align-items: center; gap: 30px; }
        .artist-img { width: 150px; height: 150px; border-radius: 50%; border: 3px solid var(--accent); object-fit: cover; }
        .profile-text h1 { font-family: var(--fh); font-size: 4rem; margin: 0; line-height: 1; }
        .profile-text p { color: var(--accent); margin: 5px 0; letter-spacing: 2px; }

        .content { padding: 40px; max-width: 1000px; margin: 0 auto; }
        .tabs { display: flex; gap: 30px; border-bottom: 1px solid #222; margin-bottom: 30px; }
        .tab { padding: 15px 0; cursor: pointer; color: #555; font-family: var(--fh); font-size: 1.5rem; border-bottom: 2px solid transparent; }
        .tab.active { color: white; border-color: var(--accent); }

        .track-row { display: flex; align-items: center; padding: 12px; border-radius: 10px; transition: 0.2s; cursor: pointer; border-bottom: 1px solid #111; gap: 20px; }
        .track-row:hover { background: #0d0d0d; }
        .track-row img { width: 50px; height: 50px; border-radius: 4px; }
        .track-name { flex: 1; font-weight: bold; }
        .track-type { font-size: 0.7rem; color: var(--accent); border: 1px solid var(--accent); padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }

        .player-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10, 10, 10, 0.98); border-top: 1px solid var(--accent); padding: 15px 40px; display: none; align-items: center; justify-content: space-between; z-index: 1000; backdrop-filter: blur(20px); }
        audio { width: 40%; filter: invert(1) hue-rotate(180deg); height: 35px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← INICIO</a>
    <div class="header">
        <img id="header-bg" src="">
        <div class="profile-info">
            <img id="profile-pic" class="artist-img" src="">
            <div class="profile-text"><h1 id="artist-name"></h1><p id="artist-meta"></p></div>
        </div>
    </div>
    <div class="content">
        <div class="tabs">
            <div class="tab active" onclick="filterTracks('all')">TODO</div>
            <div class="tab" onclick="filterTracks('single')">SINGLES</div>
            <div class="tab" onclick="filterTracks('playlist')">PLAYLISTS</div>
        </div>
        <div id="tracks-container"></div>
    </div>
    <div class="player-bar" id="global-player">
        <div style="display:flex; align-items:center; gap:15px; width:30%;">
            <img id="p-img" src="" style="width:50px; height:50px; border-radius:4px;">
            <div><h5 id="p-title" style="margin:0"></h5><p id="p-art" style="margin:0; font-size:0.7rem; color:#888;"></p></div>
        </div>
        <audio id="main-audio" controls autoplay></audio>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAQeS0wTC4HhRx78uGTvWnfjcZoZCk_zME",
            authDomain: "unp-tapes-e5942.firebaseapp.com",
            projectId: "unp-tapes-e5942",
            storageBucket: "unp-tapes-e5942.firebasestorage.app",
            messagingSenderId: "850772544349",
            appId: "1:850772544349:web:c70a87db6e32a24d1876b4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        let allTracks = [];

        async function load() {
            if(!id) return location.href = 'index.html';
            const aSnap = await getDoc(doc(db, 'artists', id));
            if(aSnap.exists()) {
                const d = aSnap.data();
                document.getElementById('artist-name').textContent = d.name;
                document.getElementById('artist-meta').textContent = d.city || 'Chile';
                const pic = d.photoURL || 'https://ui-avatars.com/api/?name='+d.name;
                document.getElementById('profile-pic').src = pic;
                document.getElementById('header-bg').src = pic;
            }
            const q = query(collection(db, 'tracks'), where('artistId', '==', id), orderBy('createdAt', 'desc'));
            const tSnap = await getDocs(q);
            tSnap.forEach(d => allTracks.push({id: d.id, ...d.data()}));
            renderTracks(allTracks);
        }

        window.renderTracks = (data) => {
            const container = document.getElementById('tracks-container');
            container.innerHTML = data.length ? '' : '<p>No hay contenido.</p>';
            data.forEach(t => {
                const row = document.createElement('div');
                row.className = 'track-row';
                row.innerHTML = `
                    <img src="${t.coverURL}">
                    <div class="track-name">${t.title}</div>
                    <span class="track-type">${t.type || 'single'}</span>
                `;
                row.onclick = () => {
                    document.getElementById('global-player').style.display = 'flex';
                    document.getElementById('main-audio').src = t.audioURL;
                    document.getElementById('p-img').src = t.coverURL;
                    document.getElementById('p-title').textContent = t.title;
                    document.getElementById('p-art').textContent = document.getElementById('artist-name').textContent;
                };
                container.appendChild(row);
            });
        }

        window.filterTracks = (type) => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            if(type === 'all') renderTracks(allTracks);
            else renderTracks(allTracks.filter(t => (t.type || 'single') === type));
        }
        load();
    </script>
</body>
</html>
