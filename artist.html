<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNDWV — Perfil de Artista</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --accent: #ff6a00; --fh: 'Bebas Neue'; --fb: 'DM Mono'; }
        body { background: var(--bg); color: #eee; font-family: var(--fb); margin: 0; }
        .header { height: 40vh; display: flex; align-items: flex-end; padding: 40px; background: linear-gradient(to top, #000, transparent); position: relative; }
        .bg-blur { position: absolute; inset: 0; z-index: -1; object-fit: cover; width: 100%; height: 100%; opacity: 0.3; filter: blur(20px); }
        .artist-img { width: 150px; height: 150px; border-radius: 50%; border: 4px solid var(--accent); object-fit: cover; }
        .info { margin-left: 30px; }
        .info h1 { font-family: var(--fh); font-size: 5rem; margin: 0; line-height: 1; }
        .tracks-section { padding: 40px; max-width: 800px; }
        .track-row { display: grid; grid-template-columns: 50px 1fr auto; align-items: center; gap: 20px; padding: 15px; border-bottom: 1px solid #111; }
        .track-row img { width: 45px; height: 45px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="header">
        <img id="header-bg" class="bg-blur">
        <img id="profile-pic" class="artist-img" src="https://via.placeholder.com/150">
        <div class="info">
            <p style="color: var(--accent); letter-spacing: 5px; font-size: 0.7rem;">ARTISTA VERIFICADO</p>
            <h1 id="artist-name">...</h1>
            <p id="artist-meta" style="color: #666;"></p>
        </div>
    </div>

    <div class="tracks-section">
        <h2 style="font-family: var(--fh); letter-spacing: 3px;">LANZAMIENTOS</h2>
        <div id="tracks-container"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAQeS0wTC4HhRx78uGTvWnfjcZoZCk_zME",
            authDomain: "unp-tapes-e5942.firebaseapp.com",
            projectId: "unp-tapes-e5942",
            storageBucket: "unp-tapes-e5942.firebasestorage.app",
            messagingSenderId: "850772544349",
            appId: "1:850772544349:web:c70a87db6e32a24d1876b4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const id = new URLSearchParams(window.location.search).get('id');

        async function loadArtist() {
            if(!id) return;
            const aSnap = await getDoc(doc(db, 'artists', id));
            if(aSnap.exists()) {
                const data = aSnap.data();
                document.getElementById('artist-name').textContent = data.name;
                document.getElementById('artist-meta').textContent = `${data.genre} · ${data.city}`;
                if(data.photoURL) {
                    document.getElementById('profile-pic').src = data.photoURL;
                    document.getElementById('header-bg').src = data.photoURL;
                }
            }

            const q = query(collection(db, 'tracks'), where('artistId', '==', id));
            const tSnap = await getDocs(q);
            const container = document.getElementById('tracks-container');
            container.innerHTML = '';

            tSnap.forEach(d => {
                const t = d.data();
                container.innerHTML += `
                    <div class="track-row">
                        <img src="${t.coverURL}">
                        <div style="font-family: var(--fh); font-size: 1.2rem;">${t.title}</div>
                        <audio src="${t.audioURL}" controls style="height: 30px;"></audio>
                    </div>
                `;
            });
        }
        loadArtist();
    </script>
</body>
</html>
