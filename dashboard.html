<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panel de Artista — SNDWV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --bg:#000000;--s1:#0d0d0d;--s2:#161616;--border:#222222;
      --accent:#ff6a00;--accent2:#ff4757;--purple:#7b4fff;
      --text:#eeeeff;--muted:#5a5a5a;--radius:12px;
      --fh:'Bebas Neue',sans-serif;--fb:'DM Mono',monospace;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh; overflow-x: hidden;}

    /* Fondo con gradientes sutiles */
    body::before{
      content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background:
        radial-gradient(ellipse 60% 50% at 10% 10%,rgba(123,79,255,.08) 0%,transparent 60%),
        radial-gradient(ellipse 50% 40% at 90% 85%,rgba(255,106,0,.05) 0%,transparent 55%);
    }

    /* --- NAV --- */
    nav{
      position:sticky;top:0;z-index:100;
      background:rgba(8,8,16,.8);backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;
      padding:0 32px;height:70px;
    }
    .nav-logo{font-family:var(--fh);font-size:1.8rem;letter-spacing:4px;color:var(--accent);text-decoration:none}
    .nav-logo em{color:var(--text);font-style:normal}
    #nav-user{display:flex;align-items:center;gap:15px;font-size:.75rem}

    /* --- BOTONES --- */
    .btn{
      font-family:var(--fb);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;
      padding:10px 20px;border-radius:8px;cursor:pointer;text-decoration:none;
      transition:all .3s;border:1px solid transparent; display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-ghost{border-color:var(--border);color:var(--muted);background:transparent}
    .btn-ghost:hover{border-color:var(--accent);color:var(--accent); background: rgba(255,106,0,0.05);}
    .btn-solid{background:var(--accent);color:#000;border-color:var(--accent); font-weight: bold;}
    .btn-solid:hover{background:#fff;border-color:#fff; transform: translateY(-2px);}
    .btn-purple{background:var(--purple);color:#fff;border-color:var(--purple)}
    .btn-purple:hover{box-shadow: 0 0 20px rgba(123,79,255,0.4); transform: translateY(-2px);}

    /* --- LAYOUT --- */
    .page{position:relative;z-index:1;max-width:850px;margin:0 auto;padding:40px 24px 100px}

    /* --- STATS CARDS --- */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px; margin-bottom: 40px;
    }
    .stat-card {
      background: var(--s1); border: 1px solid var(--border);
      padding: 20px; border-radius: var(--radius); text-align: center;
      transition: border-color .3s;
    }
    .stat-card:hover { border-color: var(--muted); }
    .stat-card span { display: block; font-family: var(--fh); font-size: 2rem; color: var(--text); line-height: 1; }
    .stat-card label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-top: 8px; display: block; }

    /* --- DASHBOARD HEADER --- */
    .dash-header {
      background: linear-gradient(to right, var(--s1), transparent);
      border: 1px solid var(--border); border-radius: 20px;
      padding: 30px; display: flex; align-items: center; gap: 25px; margin-bottom: 40px;
    }
    .dash-avatar {
      width: 90px; height: 90px; border-radius: 50%;
      border: 3px solid var(--accent); background: var(--s2);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem; overflow: hidden; flex-shrink: 0;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .dash-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .dash-info h2 { font-family: var(--fh); font-size: 2.2rem; letter-spacing: 2px; }
    .dash-info p { font-size: .75rem; color: var(--muted); margin-top: 5px; }
    .dash-actions { margin-left: auto; display: flex; flex-direction: column; gap: 10px; }

    /* --- MODALES --- */
    .modal {
      position: fixed; inset: 0; z-index: 1000;
      display: none; align-items: center; justify-content: center;
      padding: 20px; background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(10px);
    }
    .modal.open { display: flex; animation: fadeIn .3s ease; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }

    .modal-content {
      background: var(--s1); border: 1px solid var(--border);
      width: 100%; max-width: 600px; max-height: 90vh;
      overflow-y: auto; border-radius: 20px; padding: 40px;
      position: relative; box-shadow: 0 25px 50px rgba(0,0,0,0.6);
    }

    /* --- TRACK LIST (COMPACTO) --- */
    .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; border-left: 4px solid var(--accent); padding-left: 15px; }
    .section-head h3 { font-family: var(--fh); font-size: 1.4rem; letter-spacing: 3px; color: var(--text); text-transform: uppercase; }

    .my-track-card {
      background: var(--s1); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 15px; margin-bottom: 12px;
      display: grid; grid-template-columns: 60px 1fr auto;
      align-items: center; gap: 20px; transition: all .3s;
    }
    .my-track-card:hover { border-color: var(--purple); background: var(--s2); transform: scale(1.01); }
    .my-cover { width: 60px; height: 60px; border-radius: 8px; background: var(--s2); object-fit: cover; }
    .my-info .my-title { font-family: var(--fh); font-size: 1.2rem; letter-spacing: 1px; }
    .my-info .my-meta { font-size: .65rem; color: var(--muted); text-transform: uppercase; }

    .my-player {
      grid-column: 1 / -1; margin-top: 10px; padding-top: 15px;
      border-top: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 15px;
    }

    /* --- FORMULARIOS --- */
    .field { margin-bottom: 20px; }
    .field label { display: block; font-size: .65rem; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
    .field input, .field select, .field textarea {
      width: 100%; background: var(--s2); border: 1px solid var(--border);
      border-radius: 8px; color: #fff; font-family: var(--fb); padding: 12px; outline: none;
    }
    .field input:focus { border-color: var(--accent); }

    .file-drop {
      border: 2px dashed var(--border); padding: 30px; text-align: center; border-radius: 12px;
      cursor: pointer; transition: .3s;
    }
    .file-drop:hover { border-color: var(--accent); background: rgba(255,106,0,0.03); }

    /* Scrollbar personalizada */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">SND<em>WV</em></a>
  <div id="nav-user">
    <a href="#" class="btn btn-ghost" id="public-btn" style="display:none">🌐 Mi Perfil Público</a>
    <button class="btn btn-ghost" id="logout-btn" style="display:none" onclick="logOut()">Salir</button>
  </div>
</nav>

<div class="page">
  <div id="dashboard" style="display:none">

    <div class="stats-row">
      <div class="stat-card"><span id="stat-tracks">0</span><label>Tracks</label></div>
      <div class="stat-card"><span id="stat-albums">0</span><label>Álbumes</label></div>
      <div class="stat-card"><span>ACTIVO</span><label>Status</label></div>
    </div>

    <div class="dash-header">
      <div class="dash-avatar" id="dash-avatar-wrap">?</div>
      <div class="dash-info">
        <h2 id="dash-name">Cargando...</h2>
        <p id="dash-genre-city">—</p>
      </div>
      <div class="dash-actions">
        <button class="btn btn-purple" onclick="openModal('upload-modal')">＋ Subir Música</button>
        <button class="btn btn-ghost" onclick="openModal('profile-modal')">✏ Editar Perfil</button>
      </div>
    </div>

    <div class="section-head">
      <h3>Mi Biblioteca</h3>
    </div>
    <div id="my-tracks-list">
      <div class="state-msg" style="text-align: center; padding: 50px;"><div class="spinner"></div>Cargando canciones...</div>
    </div>
  </div>

  <div id="auth-section">
     <div class="auth-wrap" style="max-width: 400px; margin: 80px auto; text-align: center;">
        <h2 style="font-family: var(--fh); font-size: 3rem; margin-bottom: 20px;">ARTISTA <span style="color:var(--accent)">LOGIN</span></h2>
        <div class="field" style="text-align: left;">
            <label>Email</label>
            <input type="email" id="login-email" placeholder="artista@sndwv.com">
        </div>
        <div class="field" style="text-align: left;">
            <label>Contraseña</label>
            <input type="password" id="login-pass" placeholder="••••••••">
        </div>
        <button class="btn btn-solid" style="width: 100%; justify-content: center;" onclick="doLogin()">Entrar al Panel</button>
        <p style="margin-top: 20px; font-size: .7rem; color: var(--muted);">¿No tienes cuenta? Contacta con soporte.</p>
     </div>
  </div>
</div>

<div class="modal" id="profile-modal" onclick="closeModalOnOutsideClick(event)">
  <div class="modal-content">
    <div class="section-head">
      <h3>Ajustes de Perfil</h3>
      <button class="btn btn-ghost" onclick="closeModal('profile-modal')">✕</button>
    </div>
    <div class="field">
      <label>Nombre Artístico</label>
      <input type="text" id="edit-name">
    </div>
    <div class="field">
      <label>Ciudad / País</label>
      <input type="text" id="edit-city">
    </div>
    <div class="field">
        <label>Foto de Perfil</label>
        <div class="file-drop" onclick="document.getElementById('profile-photo-input').click()">
            <input type="file" id="profile-photo-input" hidden accept="image/*">
            <p id="profile-photo-name">Hacer clic para subir</p>
        </div>
    </div>
    <button class="btn btn-solid" style="width: 100%; justify-content: center;" onclick="saveProfile()">Guardar Cambios</button>
  </div>
</div>

<div class="modal" id="upload-modal" onclick="closeModalOnOutsideClick(event)">
  <div class="modal-content">
    <div class="section-head">
      <h3>Nueva Publicación</h3>
      <button class="btn btn-ghost" onclick="closeModal('upload-modal')">✕</button>
    </div>
    <div class="field">
      <label>Título de la canción</label>
      <input type="text" id="track-title" placeholder="Ej: Midnight Waves">
    </div>
    <div class="field">
        <label>Género Principal</label>
        <select id="track-genre">
            <option>Hip-Hop</option><option>Trap</option><option>Electronic</option><option>Lo-Fi</option>
        </select>
    </div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div class="field">
            <label>Archivo Audio</label>
            <div class="file-drop" style="padding: 15px; font-size: .6rem;" onclick="document.getElementById('audio-input').click()">
                <input type="file" id="audio-input" hidden accept="audio/*">
                <span id="audio-name">Subir MP3/WAV</span>
            </div>
        </div>
        <div class="field">
            <label>Portada</label>
            <div class="file-drop" style="padding: 15px; font-size: .6rem;" onclick="document.getElementById('cover-input').click()">
                <input type="file" id="cover-input" hidden accept="image/*">
                <span id="cover-name">Subir Imagen</span>
            </div>
        </div>
    </div>
    <button class="btn btn-purple" style="width: 100%; justify-content: center; margin-top: 10px;" id="upload-btn" onclick="uploadTrack()">Publicar Ahora</button>
  </div>
</div>

<script type="module">
  // --- IMPORTACIÓN DE FIREBASE ---
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, collection, query, where, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "TU_API_KEY", // Reemplaza con tus datos
    authDomain: "unp-tapes-e5942.firebaseapp.com",
    projectId: "unp-tapes-e5942",
    storageBucket: "unp-tapes-e5942.firebasestorage.app",
    messagingSenderId: "850772544349",
    appId: "1:850772544349:web:c70a87db6e32a24d1876b4"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const storage = getStorage(app);

  let currentUser = null;

  // --- CONTROL DE MODALES ---
  window.openModal = function(id) {
    document.getElementById(id).classList.add('open');
    document.body.style.overflow = 'hidden';
  };
  window.closeModal = function(id) {
    document.getElementById(id).classList.remove('open');
    document.body.style.overflow = 'auto';
  };
  window.closeModalOnOutsideClick = function(e) {
    if(e.target.classList.contains('modal')) closeModal(e.target.id);
  };

  // --- AUTH LOGIC ---
  onAuthStateChanged(auth, async user => {
    if(user) {
        currentUser = user;
        showUI(true);
        loadProfile();
        loadMyTracks();
    } else {
        showUI(false);
    }
  });

  function showUI(loggedIn) {
    document.getElementById('dashboard').style.display = loggedIn ? 'block' : 'none';
    document.getElementById('auth-section').style.display = loggedIn ? 'none' : 'block';
    document.getElementById('logout-btn').style.display = loggedIn ? 'block' : 'none';
    document.getElementById('public-btn').style.display = loggedIn ? 'block' : 'none';
  }

  window.doLogin = async function() {
    const email = document.getElementById('login-email').value;
    const pass = document.getElementById('login-pass').value;
    try {
        await signInWithEmailAndPassword(auth, email, pass);
    } catch(e) { alert("Error: " + e.message); }
  };

  window.logOut = () => signOut(auth);

  // --- LOAD DATA ---
  async function loadProfile() {
    const snap = await getDoc(doc(db, 'artists', currentUser.uid));
    if(snap.exists()) {
        const data = snap.data();
        document.getElementById('dash-name').textContent = data.name || 'Artista';
        document.getElementById('dash-genre-city').textContent = `${data.genre || ''} · ${data.city || ''}`;
        if(data.photoURL) document.getElementById('dash-avatar-wrap').innerHTML = `<img src="${data.photoURL}">`;

        // Llenar campos del modal
        document.getElementById('edit-name').value = data.name || '';
        document.getElementById('edit-city').value = data.city || '';
    }
  }

  async function loadMyTracks() {
    const q = query(collection(db, 'tracks'), where('artistId', '==', currentUser.uid));
    const snap = await getDocs(q);
    const list = document.getElementById('my-tracks-list');
    list.innerHTML = '';

    document.getElementById('stat-tracks').textContent = snap.size;

    snap.forEach(docSnap => {
        const t = docSnap.data();
        list.innerHTML += `
            <div class="my-track-card">
                <img src="${t.coverURL || ''}" class="my-cover">
                <div class="my-info">
                    <div class="my-title">${t.title}</div>
                    <div class="my-meta">${t.genre}</div>
                </div>
                <div class="my-actions">
                    <button class="btn btn-ghost" style="color:var(--accent2); border-color:transparent;">Eliminar</button>
                </div>
                <div class="my-player">
                    <audio src="${t.audioURL}" controls style="width: 100%; height: 30px;"></audio>
                </div>
            </div>
        `;
    });
  }

  // --- UPLOAD LOGIC (RESUMEN) ---
  window.uploadTrack = async function() {
    const btn = document.getElementById('upload-btn');
    const title = document.getElementById('track-title').value;
    const audioFile = document.getElementById('audio-input').files[0];
    const coverFile = document.getElementById('cover-input').files[0];

    if(!title || !audioFile) return alert("Título y audio obligatorios");

    btn.disabled = true;
    btn.textContent = "Subiendo...";

    try {
        // 1. Subir Audio
        const aRef = ref(storage, `tracks/${currentUser.uid}/${Date.now()}_${audioFile.name}`);
        await uploadBytesResumable(aRef, audioFile);
        const audioURL = await getDownloadURL(aRef);

        // 2. Subir Portada (si hay)
        let coverURL = "";
        if(coverFile) {
            const cRef = ref(storage, `covers/${currentUser.uid}/${Date.now()}_${coverFile.name}`);
            await uploadBytesResumable(cRef, coverFile);
            coverURL = await getDownloadURL(cRef);
        }

        // 3. Guardar en Firestore
        await setDoc(doc(collection(db, 'tracks')), {
            title, audioURL, coverURL,
            genre: document.getElementById('track-genre').value,
            artistId: currentUser.uid,
            createdAt: serverTimestamp()
        });

        alert("¡Publicado con éxito!");
        closeModal('upload-modal');
        loadMyTracks();
    } catch(e) {
        alert("Error al subir: " + e.message);
    } finally {
        btn.disabled = false;
        btn.textContent = "Publicar Ahora";
    }
  };

  // Visual names para inputs
  document.getElementById('audio-input').onchange = e => document.getElementById('audio-name').textContent = e.target.files[0].name;
  document.getElementById('cover-input').onchange = e => document.getElementById('cover-name').textContent = e.target.files[0].name;

</script>

</body>
</html>
