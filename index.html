<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unp-Tapes — Explore Sound</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --s1: #0d0d0d;
            --accent: #ff6a00;
            --purple: #7b4fff;
            --text: #eee;
            --fh: 'Bebas Neue';
            --fb: 'DM Mono';
        }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: var(--fb); margin: 0; overflow-x: hidden; padding-bottom: 120px; }
        
        nav { padding: 18px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
        .logo img { height: 60px; width: auto; display: block; filter: drop-shadow(0 0 10px rgba(255,106,0,0.2)); }
        .login-btn { color: white; text-decoration: none; border: 1px solid #333; padding: 10px 18px; border-radius: 10px; transition: 0.3s; font-size: 0.75rem; letter-spacing: 2px; }
        .login-btn:hover { border-color: var(--accent); color: var(--accent); }

        .hero { min-height: 50vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 60px 20px; }
        .hero h1 { font-family: var(--fh); font-size: clamp(4rem, 12vw, 8rem); color: var(--accent); margin: 0; line-height: 0.9; }
        .hero p { color: #888; max-width: 600px; margin: 20px 0; font-size: 1.1rem; }

        .section { padding: 40px; }
        .section-header { font-family: var(--fh); font-size: 2.5rem; margin-bottom: 30px; letter-spacing: 2px; border-left: 4px solid var(--accent); padding-left: 15px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }
        
        .artist-card { background: var(--s1); padding: 20px; border-radius: 15px; border: 1px solid #222; text-decoration: none; color: white; display: flex; align-items: center; gap: 15px; transition: 0.3s; }
        .artist-card:hover { border-color: var(--purple); transform: translateY(-5px); }
        .artist-card img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); }
        .artist-card h3 { font-family: var(--fh); font-size: 1.5rem; margin: 0; }

        .track-card { background: var(--s1); padding: 15px; border-radius: 12px; border: 1px solid #222; transition: 0.3s; cursor: pointer; position: relative; }
        .track-card.playing { border-color: var(--accent); box-shadow: 0 0 15px rgba(255, 106, 0, 0.3); background: #141414; }
        .track-card:hover { border-color: var(--accent); }
        .track-card img { width: 100%; aspect-ratio: 1; border-radius: 8px; object-fit: cover; margin-bottom: 10px; }
        .track-card h4 { margin: 5px 0; font-family: var(--fb); font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-card .type-badge { position: absolute; top: 10px; right: 10px; background: var(--accent); color: black; font-size: 0.6rem; padding: 2px 8px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }

        /* Global Player Bar */
        .player-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(5, 5, 5, 0.98); border-top: 1px solid var(--accent); padding: 10px 40px; display: none; align-items: center; justify-content: space-between; z-index: 1000; backdrop-filter: blur(25px); height: 90px; }
        .player-info { display: flex; align-items: center; gap: 15px; width: 25%; }
        .player-info img { width: 60px; height: 60px; border-radius: 5px; object-fit: cover; border: 1px solid #333; }
        .player-info div h5 { margin: 0; font-size: 1rem; color: var(--accent); }
        .player-info div p { margin: 0; font-size: 0.75rem; color: #888; }
        .player-controls { width: 50%; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        audio { width: 100%; filter: invert(1) hue-rotate(180deg) brightness(1.2); height: 35px; }
        .player-actions { width: 25%; display: flex; justify-content: flex-end; align-items: center; gap: 20px; }
        .download-link { color: #888; text-decoration: none; font-size: 0.8rem; border: 1px solid #333; padding: 5px 12px; border-radius: 5px; transition: 0.3s; }
        .download-link:hover { color: white; border-color: white; background: #222; }

        footer { padding: 60px 40px; text-align: center; color: #444; border-top: 1px solid #111; font-size: 0.8rem; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo"><img src="logo.png" alt="Unp-Tapes"></a>
        <a href="dashboard.html" class="login-btn">ACCESO ARTISTA</a>
    </nav>

    <div class="hero">
        <h1>UNP-TAPES</h1>
        <p>Tu plataforma de música independiente. Singles y Playlists directo desde la fuente.</p>
    </div>

    <div class="section">
        <h2 class="section-header">ÚLTIMOS LANZAMIENTOS</h2>
        <div class="grid" id="tracks-recent"></div>
    </div>

    <div class="section">
        <h2 class="section-header">EXPLORA ARTISTAS</h2>
        <div class="grid" id="artist-list"></div>
    </div>

    <!-- REPRODUCTOR MODERNO -->
    <div class="player-bar" id="global-player">
        <div class="player-info">
            <img id="p-img" src="">
            <div><h5 id="p-title"></h5><p id="p-artist"></p></div>
        </div>
        <div class="player-controls">
            <audio id="main-audio" controls autoplay controlsList="nodownload"></audio>
        </div>
        <div class="player-actions">
            <a href="#" id="p-download" class="download-link" download>DESCARGAR MP3</a>
        </div>
    </div>

    <footer>UNP-TAPES RECORDS &copy; 2026</footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, getDocs, orderBy, query, limit, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAQeS0wTC4HhRx78uGTvWnfjcZoZCk_zME",
            authDomain: "unp-tapes-e5942.firebaseapp.com",
            projectId: "unp-tapes-e5942",
            storageBucket: "unp-tapes-e5942.firebasestorage.app",
            messagingSenderId: "850772544349",
            appId: "1:850772544349:web:c70a87db6e32a24d1876b4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadContent() {
            const aSnap = await getDocs(query(collection(db, 'artists'), limit(10)));
            const aList = document.getElementById('artist-list');
            aList.innerHTML = '';
            aSnap.forEach(d => {
                const data = d.data();
                aList.innerHTML += `
                    <a href="artist.html?id=${d.id}" class="artist-card">
                        <img src="${data.photoURL || 'https://ui-avatars.com/api/?name='+data.name}">
                        <h3>${data.name}</h3>
                    </a>`;
            });

            const tSnap = await getDocs(query(collection(db, 'tracks'), orderBy('createdAt', 'desc'), limit(12)));
            const tList = document.getElementById('tracks-recent');
            tList.innerHTML = '';
            tSnap.forEach(d => {
                const t = d.data();
                const card = document.createElement('div');
                card.className = 'track-card';
                card.id = `card-${d.id}`;
                card.innerHTML = `
                    <span class="type-badge">${t.type || 'single'}</span>
                    <img src="${t.coverURL}">
                    <h4>${t.title}</h4>
                `;
                card.onclick = () => playTrack(t.audioURL, t.title, t.coverURL, t.artistId, d.id);
                tList.appendChild(card);
            });
        }

        async function playTrack(url, title, cover, artistId, trackId) {
            document.querySelectorAll('.track-card').forEach(c => c.classList.remove('playing'));
            const activeCard = document.getElementById(`card-${trackId}`);
            if(activeCard) activeCard.classList.add('playing');

            const player = document.getElementById('global-player');
            const audio = document.getElementById('main-audio');
            player.style.display = 'flex';
            audio.src = url;
            document.getElementById('p-img').src = cover;
            document.getElementById('p-title').textContent = title;
            document.getElementById('p-download').href = url;
            
            const aDoc = await getDoc(doc(db, 'artists', artistId));
            document.getElementById('p-artist').textContent = aDoc.exists() ? aDoc.data().name : 'Artista';
        }

        loadContent();
    </script>
</body>
</html>
