<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Artista — Unp-Tapes</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --s1: #0d0d0d; --accent: #ff6a00; --text: #eee; --fb: 'DM Mono'; --fh: 'Bebas Neue'; }
        body { background: var(--bg); color: var(--text); font-family: var(--fb); margin: 0; }
        nav { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .logo img { height: 40px; }
        .container { padding: 40px; max-width: 1200px; margin: 0 auto; }
        .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .btn { padding: 12px 24px; border-radius: 8px; cursor: pointer; border: none; font-weight: bold; font-family: var(--fb); text-transform: uppercase; }
        .btn-accent { background: var(--accent); color: black; }
        .btn-outline { background: transparent; border: 1px solid #333; color: white; margin-left: 10px; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: var(--s1); padding: 40px; border-radius: 20px; width: 100%; max-width: 500px; border: 1px solid #222; }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: white; margin-bottom: 20px; border-radius: 8px; }
        label { display: block; margin-bottom: 8px; font-size: 0.8rem; color: #888; }
        .track-list { display: grid; gap: 15px; }
        .track-item { background: var(--s1); padding: 15px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #222; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo"><img src="logo.png" alt="Unp-Tapes"></a>
        <button class="btn btn-outline" id="logout-btn" style="display:none;">CERRAR SESIÓN</button>
    </nav>
    <div class="container">
        <div id="login-form">
            <h1 style="font-family: var(--fh); font-size: 3rem;">ENTRAR AL PANEL</h1>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Contraseña">
            <button class="btn btn-accent" id="login-btn">ENTRAR</button>
        </div>
        <div id="panel-content" style="display:none;">
            <div class="header-actions">
                <h1 style="font-family: var(--fh); font-size: 3rem; margin:0;">MI CONTENIDO</h1>
                <div>
                    <button class="btn btn-outline" onclick="openM('profile-modal')">PERFIL</button>
                    <button class="btn btn-accent" onclick="openM('upload-modal')">+ SUBIR</button>
                </div>
            </div>
            <div class="track-list" id="my-tracks"></div>
        </div>
    </div>
    <div id="upload-modal" class="modal">
        <div class="modal-content">
            <h2 style="font-family: var(--fh);">SUBIR NUEVO</h2>
            <input type="text" id="t-title" placeholder="Título">
            <label>Tipo:</label>
            <select id="t-type"><option value="single">Single</option><option value="playlist">Playlist</option></select>
            <label>Audio (MP3):</label><input type="file" id="t-audio" accept="audio/*">
            <label>Portada:</label><input type="file" id="t-cover" accept="image/*">
            <button class="btn btn-accent" id="up-btn">PUBLICAR</button>
            <button class="btn btn-outline" onclick="closeM('upload-modal')">CANCELAR</button>
        </div>
    </div>
    <div id="profile-modal" class="modal">
        <div class="modal-content">
            <h2 style="font-family: var(--fh);">PERFIL</h2>
            <input type="text" id="p-name" placeholder="Nombre Artístico">
            <input type="text" id="p-city" placeholder="Ciudad">
            <button class="btn btn-accent" id="save-p-btn">GUARDAR</button>
            <button class="btn btn-outline" onclick="closeM('profile-modal')">CERRAR</button>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAQeS0wTC4HhRx78uGTvWnfjcZoZCk_zME",
            authDomain: "unp-tapes-e5942.firebaseapp.com",
            projectId: "unp-tapes-e5942",
            storageBucket: "unp-tapes-e5942.firebasestorage.app",
            messagingSenderId: "850772544349",
            appId: "1:850772544349:web:c70a87db6e32a24d1876b4"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);
        let user = null;

        onAuthStateChanged(auth, u => {
            if(u) {
                user = u;
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('panel-content').style.display = 'block';
                document.getElementById('logout-btn').style.display = 'block';
                loadData();
            }
        });

        document.getElementById('login-btn').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value).catch(e => alert(e.message));
        document.getElementById('logout-btn').onclick = () => signOut(auth).then(() => location.reload());
        window.openM = (id) => document.getElementById(id).style.display = 'flex';
        window.closeM = (id) => document.getElementById(id).style.display = 'none';

        async function loadData() {
            const q = query(collection(db, 'tracks'), where('artistId', '==', user.uid));
            const snap = await getDocs(q);
            const list = document.getElementById('my-tracks');
            list.innerHTML = '';
            snap.forEach(d => {
                list.innerHTML += `<div class="track-item"><span>${d.data().title}</span><button class="btn btn-outline" style="color:red" onclick="window.deleteT('${d.id}')">Eliminar</button></div>`;
            });
            const p = await getDoc(doc(db, 'artists', user.uid));
            if(p.exists()) {
                document.getElementById('p-name').value = p.data().name;
                document.getElementById('p-city').value = p.data().city;
            }
        }

        document.getElementById('up-btn').onclick = async () => {
            const title = document.getElementById('t-title').value;
            const type = document.getElementById('t-type').value;
            const aF = document.getElementById('t-audio').files[0];
            const cF = document.getElementById('t-cover').files[0];
            if(!title || !aF || !cF) return alert("Faltan archivos");
            const btn = document.getElementById('up-btn');
            btn.disabled = true; btn.textContent = "Subiendo...";
            try {
                const aRef = ref(storage, `audio/${user.uid}/${Date.now()}`);
                await uploadBytes(aRef, aF);
                const aURL = await getDownloadURL(aRef);
                const cRef = ref(storage, `covers/${user.uid}/${Date.now()}`);
                await uploadBytes(cRef, cF);
                const cURL = await getDownloadURL(cRef);
                await setDoc(doc(collection(db, 'tracks')), { title, type, audioURL: aURL, coverURL: cURL, artistId: user.uid, createdAt: serverTimestamp() });
                closeM('upload-modal'); loadData();
            } catch(e) { alert(e.message); } finally { btn.disabled = false; btn.textContent = "PUBLICAR"; }
        };

        document.getElementById('save-p-btn').onclick = async () => {
            await setDoc(doc(db, 'artists', user.uid), { name: document.getElementById('p-name').value, city: document.getElementById('p-city').value }, { merge: true });
            closeM('profile-modal'); loadData();
        };

        window.deleteT = async (id) => { if(confirm('¿Borrar?')) { await deleteDoc(doc(db, 'tracks', id)); loadData(); } };
    </script>
</body>
</html>
