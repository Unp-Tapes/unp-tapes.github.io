<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UNP Records — Plataforma Musical</title>
  <meta property="og:title" content="UNP Records — Música Independiente"/>
  <meta property="og:description" content="Tu plataforma de música independiente. Singles y playlists directo desde la fuente."/>
  <meta property="og:image" content="https://unp-tapes.github.io/logo.png"/>
  <meta property="og:url" content="https://unp-tapes.github.io"/>
  <meta property="og:type" content="website"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --bg:#000;--s1:#0d0d0d;--s2:#161616;--border:#222;
      --accent:#ff6a00;--muted:#5a5a5a;--text:#eeeeff;--radius:12px;
      --fh:'Bebas Neue',sans-serif;--fb:'DM Mono',monospace;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;overflow-x:hidden}
    body::before{
      content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background:
        radial-gradient(circle at 20% 30%,rgba(255,106,0,.12) 0%,transparent 40%),
        radial-gradient(circle at 80% 70%,rgba(123,79,255,.08) 0%,transparent 40%);
      filter:blur(80px);
      animation:meshMove 20s ease-in-out infinite alternate;
    }
    @keyframes meshMove{from{transform:scale(1)}to{transform:scale(1.2) translate(5%,5%)}}

    /* ── NAV ── */
    nav{
      position:sticky;top:0;z-index:100;
      background:rgba(0,0,0,.85);backdrop-filter:blur(20px) saturate(180%);
      border-bottom:1px solid rgba(255,255,255,.06);
      display:flex;align-items:center;justify-content:space-between;
      padding:0 40px;height:64px;
    }
    .nav-actions{display:flex;gap:12px;align-items:center}
    .btn{
      font-family:var(--fb);font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;
      padding:8px 18px;border-radius:6px;cursor:pointer;text-decoration:none;
      transition:all .25s;border:1px solid transparent;
    }
    .btn-ghost{border-color:var(--border);color:var(--muted);background:transparent}
    .btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
    .btn-solid{background:var(--accent);color:#000;font-weight:500}
    .btn-solid:hover{background:#ff8c00}

    /* ── HERO ── */
    .hero{
      position:relative;z-index:1;
      min-height:45vh;display:flex;flex-direction:column;
      justify-content:center;align-items:center;
      text-align:center;padding:60px 24px 40px;
    }
    .hero h1{
      font-family:var(--fh);font-size:clamp(4rem,12vw,8rem);
      color:var(--accent);margin:0;line-height:.9;
      text-shadow:0 0 40px rgba(255,106,0,.3);
    }
    .hero p{color:var(--muted);max-width:500px;margin:20px auto 0;font-size:.85rem;letter-spacing:.06em;line-height:1.6}

    /* ── WRAP ── */
    .wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 40px 80px}

    /* ── SECTION HEADER ── */
    .section-header{
      font-family:var(--fh);font-size:2rem;letter-spacing:3px;
      margin-bottom:24px;
      border-left:4px solid var(--accent);
      padding-left:16px;
      display:flex;align-items:center;justify-content:space-between;
    }
    .section-header span{font-size:.65rem;color:var(--muted);letter-spacing:.1em;font-family:var(--fb);font-weight:normal}

    /* ── SEARCH ── */
    .search-bar{
      display:flex;align-items:center;gap:12px;margin-bottom:36px;
      background:rgba(255,255,255,.03);border:1px solid var(--border);
      border-radius:8px;padding:0 16px;
    }
    .search-bar svg{width:16px;height:16px;fill:var(--muted);flex-shrink:0}
    .search-bar input{
      flex:1;background:transparent;border:none;outline:none;
      color:var(--text);font-family:var(--fb);font-size:.8rem;
      padding:12px 0;letter-spacing:.04em;
    }
    .search-bar input::placeholder{color:var(--muted)}

    /* ── LATEST TRACKS GRID ── */
    .tracks-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
      gap:16px;
      margin-bottom:56px;
    }
    .track-card{
      background:var(--s1);border:1px solid var(--border);
      border-radius:var(--radius);overflow:hidden;
      cursor:pointer;transition:transform .3s,border-color .3s,box-shadow .3s;
      animation:fadeUp .4s ease both;position:relative;
    }
    .track-card:hover{transform:translateY(-5px);border-color:var(--accent);box-shadow:0 10px 30px rgba(255,106,0,.15)}
    .track-card.playing{border-color:var(--accent);box-shadow:0 0 20px rgba(255,106,0,.25)}
    .track-card-img{
      width:100%;aspect-ratio:1;background:var(--s2);
      display:flex;align-items:center;justify-content:center;
      font-size:2.5rem;position:relative;overflow:hidden;
    }
    .track-card-img img{width:100%;height:100%;object-fit:cover;display:block}
    .track-card-overlay{
      position:absolute;inset:0;background:rgba(0,0,0,.5);
      display:flex;align-items:center;justify-content:center;
      opacity:0;transition:opacity .25s;
    }
    .track-card:hover .track-card-overlay{opacity:1}
    .track-card-overlay svg{width:36px;height:36px;fill:var(--accent)}
    .track-card.playing .track-card-overlay{opacity:1;background:rgba(255,106,0,.15)}
    .type-badge{
      position:absolute;top:8px;right:8px;
      background:var(--accent);color:#000;
      font-size:.55rem;padding:2px 7px;border-radius:4px;
      font-weight:bold;text-transform:uppercase;letter-spacing:.08em;
    }
    .track-card-body{padding:10px 12px}
    .track-card-title{font-family:var(--fh);font-size:1rem;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .track-card-artist{font-size:.62rem;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    /* ── ARTIST GRID ── */
    .artist-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
      gap:14px;
    }
    .artist-card{
      background:var(--s1);
      border:1px solid var(--border);
      border-radius:var(--radius);overflow:hidden;
      cursor:pointer;text-decoration:none;color:inherit;
      display:flex;align-items:center;gap:16px;
      padding:16px;
      transition:transform .3s cubic-bezier(.175,.885,.32,1.275),border-color .3s,box-shadow .3s;
      animation:fadeUp .4s ease both;
    }
    .artist-card:hover{
      transform:translateY(-4px);
      border-color:var(--accent);
      box-shadow:0 8px 28px rgba(255,106,0,.12);
    }
    .artist-avatar{
      width:64px;height:64px;border-radius:50%;
      background:var(--s2);flex-shrink:0;
      border:2px solid var(--accent);
      display:flex;align-items:center;justify-content:center;
      font-family:var(--fh);font-size:1.8rem;color:var(--muted);
      overflow:hidden;
    }
    .artist-avatar img{width:100%;height:100%;object-fit:cover}
    .artist-info{flex:1;min-width:0}
    .artist-name{font-family:var(--fh);font-size:1.4rem;letter-spacing:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .artist-meta{font-size:.62rem;color:var(--muted);margin-top:3px;letter-spacing:.06em}
    .artist-tag{
      display:inline-block;margin-top:6px;
      font-size:.55rem;padding:2px 8px;border-radius:4px;
      background:rgba(255,106,0,.08);color:var(--accent);
      border:1px solid rgba(255,106,0,.18);text-transform:uppercase;letter-spacing:.08em;
    }

    /* ── SKELETON ── */
    .skeleton-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
    .skeleton-card{border-radius:var(--radius);overflow:hidden;background:var(--s1);border:1px solid var(--border)}
    .skeleton-img{width:100%;aspect-ratio:1;background:var(--s2);animation:shimmer 1.4s infinite}
    .skeleton-body{padding:14px 16px;display:flex;flex-direction:column;gap:8px}
    .skeleton-line{height:10px;border-radius:4px;background:var(--s2);animation:shimmer 1.4s infinite}
    .skeleton-line.w60{width:60%}.skeleton-line.w40{width:40%}
    @keyframes shimmer{0%,100%{background:var(--s2)}50%{background:#1e1e1e}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
    .state-msg{text-align:center;padding:60px 0;color:var(--muted);font-size:.78rem;letter-spacing:.1em}

    /* ── VIDEOS ── */
    .videos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
    .video-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .3s,border-color .3s,box-shadow .3s;animation:fadeUp .4s ease both}
    .video-card:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:0 8px 28px rgba(255,106,0,.15)}
    .video-thumb{position:relative;aspect-ratio:16/9;overflow:hidden;background:var(--s2)}
    .video-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
    .video-card:hover .video-thumb img{transform:scale(1.04)}
    .video-play-overlay{position:absolute;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;transition:background .2s}
    .video-card:hover .video-play-overlay{background:rgba(0,0,0,.2)}
    .video-play-icon{width:52px;height:52px;border-radius:50%;background:rgba(255,106,0,.9);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(255,106,0,.5);transition:transform .2s}
    .video-card:hover .video-play-icon{transform:scale(1.1)}
    .video-play-icon svg{width:20px;height:20px;fill:#000}
    .video-info{padding:12px 14px}
    .video-title{font-family:var(--fh);font-size:1.05rem;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .video-artist{font-size:.62rem;color:var(--muted);margin-top:3px}
    /* Video modal */
    .video-modal{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.92);backdrop-filter:blur(16px);display:none;align-items:center;justify-content:center;padding:20px}
    .video-modal.open{display:flex}
    .video-modal-inner{width:100%;max-width:860px;position:relative}
    .video-modal-close{position:absolute;top:-40px;right:0;background:transparent;border:none;color:#fff;font-size:1.5rem;cursor:pointer;padding:4px 12px;transition:color .2s}
    .video-modal-close:hover{color:var(--accent)}
    .video-iframe-wrap{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:var(--radius)}
    .video-iframe-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none}

    footer{position:relative;z-index:1;text-align:center;padding:32px;border-top:1px solid var(--border);font-size:.65rem;color:var(--muted);letter-spacing:.1em}
    footer span{color:var(--accent)}

    @media(max-width:600px){
      nav{padding:0 16px}
      .wrap{padding:0 16px 60px}
      .artist-grid{grid-template-columns:1fr}
      .tracks-grid{grid-template-columns:repeat(2,1fr);gap:10px}
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" style="text-decoration:none">
    <img src="logo.png" alt="UNP Records" style="height:42px;display:block;filter:drop-shadow(0 0 10px rgba(255,106,0,.2))" onerror="this.style.display='none'"/>
  </a>
  <div class="nav-actions">
    <a href="dashboard.html" class="btn btn-ghost">Acceso Artista</a>
    <a href="dashboard.html#register" class="btn btn-solid">Unirse</a>
  </div>
</nav>

<div class="hero">
  <h1>UNP-TAPES</h1>
  <p>Tu plataforma de música independiente. Singles y playlists directo desde la fuente.</p>
</div>

<div class="wrap">

  <!-- BÚSQUEDA -->
  <div class="search-bar">
    <svg viewBox="0 0 24 24"><path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
    <input type="text" id="searchInput" placeholder="Buscar artista, género…" oninput="filterArtists()"/>
  </div>

  <!-- VIDEOS -->
  <div id="videos-section" style="margin-bottom:56px;display:none">
    <h2 class="section-header">
      VIDEOS
      <span>YouTube · Clips oficiales</span>
    </h2>
    <div class="videos-grid" id="videos-grid"></div>
  </div>

  <!-- ÚLTIMOS LANZAMIENTOS -->
  <div id="latest-section" style="margin-bottom:56px;display:none">
    <h2 class="section-header">
      ÚLTIMOS LANZAMIENTOS
      <span>Los tracks más recientes</span>
    </h2>
    <div class="tracks-grid" id="latest-tracks"></div>
  </div>

  <!-- ARTISTAS -->
  <h2 class="section-header">
    EXPLORA ARTISTAS
    <span id="artist-count"></span>
  </h2>
  <div id="content">
    <div class="skeleton-grid">
      <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line w60"></div><div class="skeleton-line w40"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line w60"></div><div class="skeleton-line w40"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line w60"></div><div class="skeleton-line w40"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line w60"></div><div class="skeleton-line w40"></div></div></div>
    </div>
  </div>

</div>

<footer><p>UNP Records · Música independiente · <span>Santiago, Chile</span></p></footer>

<!-- VIDEO MODAL -->
<div class="video-modal" id="video-modal" onclick="if(event.target===this)closeVideo()">
  <div class="video-modal-inner">
    <button class="video-modal-close" onclick="closeVideo()">✕</button>
    <div class="video-iframe-wrap">
      <iframe id="video-iframe" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp }              from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection,
           getDocs, query, orderBy,
           limit, collectionGroup }     from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAQeS0wTC4HhRx78uGTvWnfjcZoZCk_zME",
    authDomain: "unp-tapes-e5942.firebaseapp.com",
    projectId: "unp-tapes-e5942",
    storageBucket: "unp-tapes-e5942.firebasestorage.app",
    messagingSenderId: "850772544349",
    appId: "1:850772544349:web:c70a87db6e32a24d1876b4"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  let allArtists = [];
  let artistMap  = {};

  async function loadAll(){
    try{
      const aSnap = await getDocs(collection(db,'artists'));
      const artists = [];
      for(const d of aSnap.docs){
        const artist = {id:d.id,...d.data()};
        const tSnap  = await getDocs(collection(db,`artists/${d.id}/tracks`));
        artist.trackCount = tSnap.size;
        artistMap[d.id] = artist;
        if(tSnap.size > 0) artists.push(artist);
      }
      allArtists = artists;

      // Cargar videos de todos los artistas
      const allVideos = [];
      for(const artist of artists){
        try{
          const vSnap = await getDocs(query(collection(db,`artists/${artist.id}/videos`), orderBy('createdAt','desc')));
          vSnap.forEach(d => allVideos.push({id:d.id,...d.data(), artistId:artist.id, artistName:artist.name||''}));
        }catch(e){}
      }
      renderVideos(allVideos);

      // Últimos tracks
      try{
        const tSnap = await getDocs(query(collectionGroup(db,'tracks'), orderBy('createdAt','desc'), limit(8)));
        const latestTracks = [];
        tSnap.forEach(d => latestTracks.push({id:d.id,...d.data(), artistId: d.ref.parent.parent.id}));
        renderLatest(latestTracks);
      } catch(e){ console.warn('Latest tracks:', e.message); }

      renderArtists(allArtists);
    } catch(e){
      document.getElementById('content').innerHTML = `<div class="state-msg">Error al cargar: ${e.message}</div>`;
    }
  }

  function renderVideos(videos){
    if(!videos.length) return;
    document.getElementById('videos-section').style.display = 'block';
    document.getElementById('videos-grid').innerHTML = videos.map((v,i)=>`
      <div class="video-card" onclick="openVideo('${v.youtubeId}')" style="animation-delay:${i*.05}s">
        <div class="video-thumb">
          <img src="https://img.youtube.com/vi/${v.youtubeId}/mqdefault.jpg" alt="${v.title}" loading="lazy"/>
          <div class="video-play-overlay">
            <div class="video-play-icon"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
          </div>
        </div>
        <div class="video-info">
          <div class="video-title">${v.title}</div>
          <div class="video-artist">${v.artistName}</div>
        </div>
      </div>`).join('');
  }

  window.openVideo = function(id){
    document.getElementById('video-iframe').src=`https://www.youtube.com/embed/${id}?autoplay=1`;
    document.getElementById('video-modal').classList.add('open');
    document.body.style.overflow='hidden';
  };
  window.closeVideo = function(){
    document.getElementById('video-iframe').src='';
    document.getElementById('video-modal').classList.remove('open');
    document.body.style.overflow='auto';
  };

  function renderLatest(tracks){
    if(!tracks.length) return;
    const section = document.getElementById('latest-section');
    const grid    = document.getElementById('latest-tracks');
    section.style.display = 'block';
    grid.innerHTML = tracks.map(t => `
      <a class="track-card" href="artist.html?id=${t.artistId}" style="animation-delay:${Math.random()*.2}s">
        <div class="track-card-img">
          ${t.coverURL ? `<img src="${t.coverURL}" alt="${t.title}" loading="lazy"/>` : '🎵'}
          <div class="track-card-overlay"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
          <span class="type-badge">${t.type||'single'}</span>
        </div>
        <div class="track-card-body">
          <div class="track-card-title">${t.title||'Sin título'}</div>
          <div class="track-card-artist">${artistMap[t.artistId]?.name||'Artista'}</div>
        </div>
      </a>`).join('');
  }

  function renderArtists(artists){
    const container = document.getElementById('content');
    document.getElementById('artist-count').textContent = `${artists.length} artista${artists.length!==1?'s':''}`;
    if(!artists.length){
      container.innerHTML = `<div class="state-msg">Aún no hay artistas registrados.</div>`;
      return;
    }
    container.innerHTML = `<div class="artist-grid">${artists.map((a,i) => `
      <a class="artist-card" href="artist.html?id=${a.id}" style="animation-delay:${i*.05}s">
        <div class="artist-avatar">
          ${a.photoURL ? `<img src="${a.photoURL}" alt="${a.name}" loading="lazy"/>` : (a.name||'?')[0].toUpperCase()}
        </div>
        <div class="artist-info">
          <div class="artist-name">${a.name||'Artista'}</div>
          <div class="artist-meta">${a.trackCount} track${a.trackCount!==1?'s':''} ${a.city?'· '+a.city:''}</div>
          ${a.genre?`<span class="artist-tag">${a.genre}</span>`:''}
        </div>
        <svg viewBox="0 0 24 24" width="16" height="16" fill="#444" style="flex-shrink:0"><path d="M9 18l6-6-6-6"/></svg>
      </a>`).join('')}</div>`;
  }

  let filterTimeout;
  window.filterArtists = function(){
    clearTimeout(filterTimeout);
    filterTimeout = setTimeout(()=>{
      const q = document.getElementById('searchInput').value.toLowerCase().trim();
      if(!q){ renderArtists(allArtists); return; }
      renderArtists(allArtists.filter(a =>
        (a.name||'').toLowerCase().includes(q) ||
        (a.genre||'').toLowerCase().includes(q) ||
        (a.city||'').toLowerCase().includes(q)
      ));
    }, 250);
  };

  loadAll();
</script>
</body>
</html>
