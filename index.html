<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNDWV — Explore Sound</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000; --s1: #0d0d0d; --accent: #ff6a00; --text: #eee; --fh: 'Bebas Neue'; --fb: 'DM Mono';
        }
        body { background: var(--bg); color: var(--text); font-family: var(--fb); margin: 0; }
        nav { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .logo { font-family: var(--fh); font-size: 2rem; color: var(--accent); text-decoration: none; letter-spacing: 3px; }
        .hero { padding: 80px 40px; text-align: center; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); }
        .hero h1 { font-family: var(--fh); font-size: 5rem; margin: 0; letter-spacing: 5px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 30px; padding: 40px; }
        .card { background: var(--s1); border-radius: 12px; overflow: hidden; transition: 0.3s; cursor: pointer; border: 1px solid #222; }
        .card:hover { transform: translateY(-10px); border-color: var(--accent); }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card-info { padding: 15px; }
        .card-info h4 { margin: 0; font-family: var(--fh); font-size: 1.2rem; }
        .card-info p { font-size: 0.7rem; color: #666; text-transform: uppercase; margin-top: 5px; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">SNDWV</a>
        <a href="dashboard.html" style="color: #fff; text-decoration: none; font-size: 0.8rem;">PANEL ARTISTA →</a>
    </nav>
    <div class="hero">
        <h1>DESCUBRE EL SONIDO</h1>
        <p style="color: #555;">Nuevos lanzamientos de artistas independientes</p>
    </div>
    <div class="grid" id="explorer-grid">
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAQeS0wTC4HhRx78uGTvWnfjcZoZCk_zME",
            authDomain: "unp-tapes-e5942.firebaseapp.com",
            projectId: "unp-tapes-e5942",
            storageBucket: "unp-tapes-e5942.firebasestorage.app",
            messagingSenderId: "850772544349",
            appId: "1:850772544349:web:c70a87db6e32a24d1876b4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadExplorer() {
            const q = query(collection(db, "tracks"), orderBy("createdAt", "desc"));
            const snap = await getDocs(q);
            const grid = document.getElementById('explorer-grid');
            grid.innerHTML = '';

            snap.forEach(doc => {
                const track = doc.data();
                grid.innerHTML += `
                    <div class="card" onclick="location.href='artist.html?id=${track.artistId}'">
                        <img src="${track.coverURL || 'https://via.placeholder.com/200'}" alt="Cover">
                        <div class="card-info">
                            <h4>${track.title}</h4>
                            <p>${track.genre || 'Single'}</p>
                        </div>
                    </div>
                `;
            });
        }
        loadExplorer();
    </script>
</body>
</html>
